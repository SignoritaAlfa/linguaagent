<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#ffffff">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaAgent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
html, body { background: #ffffff !important; color: #0e1117 !important; color-scheme: light; overscroll-behavior: none; }
html { min-height: 100%; min-height: -webkit-fill-available; }
:root{
  --bg:#ffffff;
  --bg2:#f0f4f8;
  --bg3:#e5ebf2;
  --surface:#ffffff;
  --surface2:#f7f9fc;
  --border:#e4e7eb;
  --border2:#d4d8df;
  --text:#0e1117;
  --text2:#3a3f4b;
  --text3:#6b7280;
  --gold:#2e7d4f;
  --gold2:#256640;
  --gold-dim:#e6f0ea;
  --green-light:#5aab76;
  --red:#d62828;
  --red2:#9d0208;
  --red-dim:#fce4e4;
  --ok:#e6f5ec;
  --ok-text:#2a7a48;
  --err:#fdeaea;
  --err-text:#c53030;
  --r:4px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html{background:#ffffff !important;min-height:100%;}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:#ffffff !important;
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.6;
}

/* ── TOPNAV ── */
.topnav{
  width:100%;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;
  letter-spacing:.02em;color:var(--text);
}
.logo em{font-style:italic;color:var(--gold)}
.hbtn{
  padding:7px 16px;
  border:1px solid var(--border2);
  background:transparent;color:var(--text3);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  transition:all .2s;border-radius:2px;
}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.hbtn.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

/* ── LANG TABS ── */
.lang-hero{
  width:100%;
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  padding:0 40px;
}
.lang-tab{
  padding:16px 28px 14px;
  border:none;border-bottom:1px solid transparent;
  background:transparent;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
  color:var(--text3);letter-spacing:.12em;text-transform:uppercase;
  transition:all .2s;
  display:flex;align-items:center;gap:10px;
  margin-bottom:-1px;
}
.lang-tab:hover{color:var(--text2)}
.lang-tab.sel{color:var(--gold);border-bottom-color:var(--gold)}
.lang-flag{font-size:16px}
.lang-name{font-size:11px}

/* ── MAIN ── */
.main{width:100%;max-width:1000px;margin:0 auto;padding:48px 40px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.main>*{animation:fadeIn .35s ease both}
.main>*:nth-child(2){animation-delay:.05s}
.main>*:nth-child(3){animation-delay:.1s}

/* ── TYPOGRAPHY ── */
.page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;font-weight:400;letter-spacing:-.01em;
  color:var(--text);margin-bottom:6px;line-height:1.15;
}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:40px;letter-spacing:.06em;text-transform:uppercase}
.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;color:var(--text);
}
.sec-label{font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}

/* ── LESSON GRID ── */
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:48px}
.lesson-cell{background:var(--surface);transition:background .2s}
.lesson-cell:hover{background:var(--surface2)}
.lesson-cell-body{padding:28px 28px 22px}
.lesson-num{font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px}
.lesson-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;color:var(--text);margin-bottom:4px;
}
.lesson-topic{font-size:12px;color:var(--text3);margin-bottom:20px}
.level-pill{
  display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 10px;border:1px solid var(--border2);color:var(--text3);
}

/* ── ACTION STRIP ── */
.action-strip{display:flex;border-top:1px solid var(--border)}
.action-btn{
  flex:1;padding:13px 8px;border:none;border-right:1px solid var(--border);
  background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:background .15s;
}
.action-btn:last-child{border-right:none}
.action-btn:hover{background:var(--bg3)}
.aicon{font-size:16px;opacity:.6}
.alabel{font-size:10px;font-weight:500;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.adesc{font-size:10px;color:var(--text3)}

/* ── SECTION HEAD ── */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:16px;margin-bottom:24px;
  border-bottom:1px solid var(--border);
}
.add-btn{
  padding:7px 18px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  transition:all .2s;border-radius:2px;
}
.add-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── MY LESSON ROW ── */
.my-lesson-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid var(--border);
}
.my-lesson-row:last-child{border-bottom:none}
.my-lesson-title{font-size:14px;font-weight:400;color:var(--text);margin-bottom:2px}
.my-lesson-meta{font-size:11px;color:var(--text3);letter-spacing:.04em}
.my-lesson-actions{display:flex;gap:8px}

/* ── BACK BTN ── */
.back-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  padding:0;margin-bottom:32px;display:flex;align-items:center;gap:8px;transition:color .2s;
}
.back-btn:hover{color:var(--gold)}

/* ── LESSON VIEW ── */
.lesson-header{margin-bottom:40px}
.dialog-wrap{max-width:700px}
.dialog-controls{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);
}
.dialog-label{font-size:10px;color:var(--text3);letter-spacing:.2em;text-transform:uppercase}
.play-btn{
  padding:8px 22px;border:1px solid var(--gold);
  background:transparent;color:var(--gold);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  transition:all .2s;border-radius:2px;
}
.play-btn:hover{background:var(--gold-dim)}
.stop-btn{
  padding:8px 22px;border:1px solid var(--err-text);
  background:transparent;color:var(--err-text);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  border-radius:2px;
}
.dline{
  display:grid;grid-template-columns:100px 1fr;gap:12px 24px;
  padding:18px 0;border-bottom:1px solid var(--border);transition:all .15s;
}
.dline:last-child{border-bottom:none}
.dline.active{background:var(--gold-dim);margin:0 -20px;padding:18px 20px;border-radius:4px;border-left:3px solid var(--gold);animation:pulseActive 1.5s ease-in-out infinite}
@keyframes pulseActive{0%,100%{opacity:1}50%{opacity:.85}}
.spk{
  font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;
  color:var(--text3);padding-top:3px;
  display:flex;align-items:flex-start;justify-content:space-between;
}
.spk.me{color:var(--gold)}
.spk-btn{background:none;border:none;cursor:pointer;font-size:13px;opacity:.3;transition:opacity .15s}
.spk-btn:hover{opacity:1}
.dline-orig{font-size:15px;color:var(--text);margin-bottom:4px;line-height:1.55}
.dline-tr{font-size:12px;color:var(--text3);font-style:italic}

/* ── VOCAB ── */
.vocab-wrap{max-width:700px;margin-top:52px}
.vrow{
  display:grid;grid-template-columns:28px 1fr 1fr;gap:12px 24px;
  align-items:start;padding:14px 0;border-bottom:1px solid var(--border);
}
.vrow:last-child{border-bottom:none}
.v-word{font-size:14px;font-weight:500;color:var(--text)}
.v-tr{font-size:13px;color:var(--gold)}
.v-ipa{font-family:monospace;font-size:11px;color:var(--text3);margin-top:2px}

/* ── GRAMMAR ── */
.grammar-wrap{max-width:700px}
.grammar-block{padding:20px 0;border-bottom:1px solid var(--border)}
.grammar-block:last-child{border-bottom:none}
.grammar-rule{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:400;color:var(--text);margin-bottom:8px;
}
.grammar-ex{font-size:13px;color:var(--text2);font-style:italic;margin-bottom:3px}
.grammar-extr{font-size:12px;color:var(--text3);margin-bottom:8px}
.grammar-note{
  font-size:12px;color:var(--text2);
  border-left:2px solid var(--gold);padding:10px 14px;
  background:var(--gold-dim);line-height:1.7;
}

/* ── PROGRESS ── */
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);letter-spacing:.06em;margin-bottom:8px}
.prog-bar{height:1px;background:var(--border2);margin-bottom:36px}
.prog-fill{height:100%;background:var(--gold);transition:width .4s}

/* ── FLASHCARD ── */
.fc-wrap{max-width:580px}
.dir-row{display:flex;gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:24px}
.dir-btn{
  flex:1;padding:9px;border:none;background:var(--surface);
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;
}
.dir-btn:hover{color:var(--text2)}
.dir-btn.sel{background:var(--gold-dim);color:var(--gold)}
.fc{
  width:100%;min-height:280px;
  border:1px solid var(--border2);background:var(--surface);
  padding:48px 40px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;cursor:pointer;gap:10px;transition:all .25s;margin-bottom:16px;
  position:relative;
}
.fc::after{
  content:'';position:absolute;inset:8px;
  border:1px solid transparent;pointer-events:none;transition:border-color .25s;
}
.fc:hover::after{border-color:var(--border2)}
.fc.open{background:var(--bg3);border-color:var(--gold)}
.fc.open::after{border-color:var(--gold-dim)}
.fc-lang{font-size:9px;color:var(--text3);letter-spacing:.25em;text-transform:uppercase;margin-bottom:6px}
.fc-word{
  font-family:'Cormorant Garamond',serif;
  font-size:40px;font-weight:400;color:var(--text);line-height:1.1;
}
.fc-tr{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-style:italic;color:var(--gold);
}
.fc-ipa{font-family:monospace;font-size:12px;color:var(--text3);margin-top:2px}
.fc-pl{
  font-size:12px;padding:4px 16px;
  border:1px solid var(--gold-dim);color:var(--gold);
  background:transparent;display:inline-block;margin-top:4px;
}
.fc-ex{
  font-size:13px;color:var(--text3);font-style:italic;
  border-top:1px solid var(--border);padding-top:14px;
  margin-top:10px;width:100%;text-align:left;
}
.fc-ex-tr{font-size:12px;color:var(--text3);opacity:.7;margin-top:3px}
.hint{color:var(--text3);font-size:12px;letter-spacing:.06em;margin-top:12px}
.ans-row{display:flex;gap:1px;background:var(--border)}
.btn-no{
  flex:1;padding:14px;border:none;background:var(--surface);
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;
}
.btn-no:hover{background:var(--err);color:var(--err-text)}
.btn-yes{
  flex:1;padding:14px;border:none;background:var(--surface);
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;
}
.btn-yes:hover{background:var(--ok);color:var(--ok-text)}

/* ── FILL ── */
.fill-wrap{max-width:640px;background:#ffffff;padding:4px 0}
.fill-hint{font-size:11px;color:#5a5850 !important;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.fill-sentence{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;font-weight:500;
  color:#0e1117 !important;
  margin-bottom:28px;line-height:1.5;
  text-shadow:none;
}
@media(max-width:720px){
  .fill-sentence{font-size:18px;background:#ffffff;border-radius:4px;padding:8px 0}
}
.fill-inp{
  width:100%;padding:14px 18px;
  border:1px solid var(--border2);border-bottom:2px solid var(--gold);
  background:var(--surface);color:var(--text);
  font-size:15px;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color .2s;border-radius:0;
}
.fill-inp:focus{border-bottom-color:var(--gold2)}
.fill-inp.ok{border-bottom-color:var(--ok-text)}
.fill-inp.bad{border-bottom-color:var(--err-text)}
.feedback{margin-top:12px;padding:12px 16px;font-size:13px}
.feedback.ok{background:var(--ok);color:var(--ok-text);border-left:2px solid var(--ok-text)}
.feedback.bad{background:var(--err);color:var(--err-text);border-left:2px solid var(--err-text)}
.next-btn{
  width:100%;margin-top:12px;padding:13px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;
}
.next-btn:hover{border-color:var(--gold);color:var(--gold)}
.check-btn{
  width:100%;padding:13px;border:none;
  background:var(--gold-dim);border:1px solid var(--gold);
  color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  margin-top:12px;transition:all .2s;
}
.check-btn:hover{background:var(--gold);color:var(--bg)}

/* ── RESULTS ── */
.result-wrap{max-width:480px;padding:72px 0;text-align:center}
.result-emoji{font-size:52px;margin-bottom:20px;display:block}
.result-title{
  font-family:'Cormorant Garamond',serif;
  font-size:42px;font-weight:400;margin-bottom:8px;
}
.result-sub{font-size:13px;color:var(--text3);letter-spacing:.06em;margin-bottom:40px}
.result-btns{display:flex;gap:1px;background:var(--border)}
.result-btn{
  flex:1;padding:14px;border:none;background:var(--surface);
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .15s;
}
.result-btn:hover{background:var(--surface2);color:var(--text)}
.result-btn.primary{background:var(--gold-dim);color:var(--gold)}
.result-btn.primary:hover{background:var(--gold);color:var(--bg)}

/* ── SETTINGS ── */
.settings-wrap{max-width:580px}
.settings-title{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:400;margin-bottom:4px;
}
.settings-sub{font-size:12px;color:var(--text3);margin-bottom:28px;line-height:1.7;letter-spacing:.02em}
.eng-grid{display:flex;gap:1px;background:var(--border);margin-bottom:32px}
.eng-btn{
  flex:1;padding:16px 10px;border:none;background:var(--surface);
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;text-align:center;
}
.eng-btn:hover{background:var(--surface2)}
.eng-btn.sel{background:var(--gold-dim)}
.eng-name{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:3px;letter-spacing:.04em}
.eng-btn.sel .eng-name{color:var(--gold)}
.eng-desc{font-size:10px;color:var(--text3);opacity:.6}
.voice-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.voice-row:last-child{border-bottom:none}
.v-name{font-size:13px;color:var(--text2);transition:color .15s}
.v-desc{font-size:11px;color:var(--text3);margin-top:1px}
.sel-row .v-name{color:var(--gold)}
.voice-dot{
  width:7px;height:7px;border-radius:50%;
  border:1px solid var(--border2);flex-shrink:0;transition:all .15s;
}
.sel-row .voice-dot{background:var(--gold);border-color:var(--gold)}
.key-inp{
  width:100%;padding:12px 16px;
  border:1px solid var(--border);border-bottom:2px solid var(--border2);
  background:var(--surface);color:var(--text);
  font-family:monospace;font-size:13px;
  outline:none;margin-bottom:6px;transition:border-color .2s;border-radius:0;
}
.key-inp:focus{border-bottom-color:var(--gold)}
.msg-ok{padding:10px 14px;background:var(--ok);color:var(--ok-text);font-size:12px;border-radius:0;margin-bottom:10px;border-left:2px solid var(--ok-text)}
.msg-err{padding:10px 14px;background:var(--err);color:var(--err-text);font-size:12px;border-radius:0;margin-bottom:10px;border-left:2px solid var(--err-text)}
.sbtn{
  padding:8px 16px;border:1px solid var(--border2);background:transparent;
  color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;border-radius:2px;
}
.sbtn:hover{border-color:var(--text3);color:var(--text)}
.sbtn.danger{border-color:var(--err-text);color:var(--err-text)}
.primary{
  padding:10px 22px;border:1px solid var(--gold);background:var(--gold-dim);
  color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  transition:all .2s;border-radius:2px;
}
.primary:hover{background:var(--gold);color:var(--bg)}
.row{display:flex;gap:8px;align-items:center;margin-top:10px}
.settings-divider{border:none;border-top:1px solid var(--border);margin:28px 0}

/* ── UPLOAD ── */
.upload-panel{
  background:var(--surface);
  border:1px solid var(--border);border-top:2px solid var(--gold);
  padding:28px;margin-bottom:20px;
}
.upload-title{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:400;margin-bottom:4px;
}
.upload-sub{font-size:12px;color:var(--text3);margin-bottom:20px;letter-spacing:.02em}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:20px}
.upload-opt{
  background:var(--surface);padding:22px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  text-align:center;transition:background .15s;
}
.upload-opt:hover{background:var(--surface2)}
.uicon{font-size:26px;opacity:.5}
.ulabel{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:.04em}
.udesc{font-size:11px;color:var(--text3)}

/* ── FILMOTEKA ── */
.film-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);margin-bottom:32px}
.film-card{background:var(--surface);transition:background .15s;cursor:pointer}
.film-card:hover{background:var(--surface2)}
.film-badge{
  display:inline-block;font-size:9px;font-weight:500;
  padding:2px 8px;border:1px solid var(--border2);
  color:var(--text3);margin-right:4px;margin-bottom:10px;
  letter-spacing:.1em;text-transform:uppercase;
}
.film-title{
  font-family:'Cormorant Garamond',serif;

// ── INDEXEDDB FOR VIDEO FILES ─────────────────────────────────────────────────
const DB_NAME="lingua_db", DB_VER=1, STORE="videos";
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function saveVideo(key,blob){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(blob,key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function loadVideo(key){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readonly");
    const r=tx.objectStore(STORE).get(key);
    r.onsuccess=e=>res(e.target.result);
    r.onerror=e=>rej(e.target.error);
  });
}
async function deleteVideo(key){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(key);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

// ── GOOGLE DRIVE SYNC ────────────────────────────────────────────────────────
const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata";
const DRIVE_FILENAME = "lingua_data.json";
let _driveTokenClient = null;
let _driveSyncTimer = null;

function initDriveTokenClient(){
  if(!S.driveClientId) return null;
  if(!window.google || !window.google.accounts || !window.google.accounts.oauth2) return null;
  if(_driveTokenClient && _driveTokenClient._clientId===S.driveClientId) return _driveTokenClient;
  _driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: S.driveClientId,
    scope: DRIVE_SCOPE,
    callback: async (resp)=>{
      if(resp.error){
        S.driveStatus="error";
        S.driveError = resp.error_description || resp.error || "OAuth error";
        render(); return;
      }
      S.driveToken = resp.access_token;
      S.driveTokenExpires = Date.now() + (parseInt(resp.expires_in,10) || 3599) * 1000;
      S.driveStatus = "connected";
      S.driveError = "";
      localStorage.setItem("lingua_drive_token", resp.access_token);
      localStorage.setItem("lingua_drive_token_expires", String(S.driveTokenExpires));
      localStorage.setItem("lingua_drive_was_connected","1");
      render();
      await driveFindFile();
      await driveSync(true);
    }
  });
  _driveTokenClient._clientId = S.driveClientId;
  return _driveTokenClient;
}

function buildSyncPayload(){
  return {
    version: 1,
    lastModified: Date.now(),
    myLessons: S.myLessons,
    lessonFolders: S.lessonFolders,
    myFilms: S.myFilms,
    filmClipUrls: S.filmClipUrls,
    workerUrl: S.workerUrl || "",
    srs: S.srs,
    wordStatus: JSON.parse(localStorage.getItem("lingua_word_status")||"{}"),
    claudeKey: S.claudeKey || "",
    geminiKey: S.geminiKey || "",
    rapidKey: S.rapidKey || "",
    oaiKey: S.oaiKey || "",
    elKey: S.elKey || "",
    lessonAudio: S.lessonAudio,
    lessonVideos: S.lessonVideos,
    palette: S.palette || "green",
    theme: S.theme || "light"
  };
}

function applyDriveData(remote){
  if(!remote || typeof remote!=="object") return;
  if(remote.myLessons){ S.myLessons=remote.myLessons; localStorage.setItem("lingua_my_lessons", JSON.stringify(S.myLessons)); }
  if(remote.lessonFolders){ S.lessonFolders=remote.lessonFolders; localStorage.setItem("lingua_lesson_folders", JSON.stringify(S.lessonFolders)); }
  if(remote.myFilms){ S.myFilms=remote.myFilms; localStorage.setItem("lingua_my_films", JSON.stringify(S.myFilms)); }
  if(remote.filmClipUrls){ S.filmClipUrls=remote.filmClipUrls; localStorage.setItem("lingua_film_clip_urls", JSON.stringify(S.filmClipUrls)); }
  if(typeof remote.workerUrl === "string"){ S.workerUrl=remote.workerUrl; if(remote.workerUrl) localStorage.setItem("lingua_worker_url", remote.workerUrl); else localStorage.removeItem("lingua_worker_url"); }
  if(remote.srs){ S.srs=remote.srs; localStorage.setItem("lingua_srs", JSON.stringify(S.srs)); }
  if(remote.wordStatus) localStorage.setItem("lingua_word_status", JSON.stringify(remote.wordStatus));
  if(remote.lessonAudio){ S.lessonAudio=remote.lessonAudio; localStorage.setItem("lingua_audio", JSON.stringify(S.lessonAudio)); }
  if(remote.lessonVideos){ S.lessonVideos=remote.lessonVideos; localStorage.setItem("lingua_lesson_videos", JSON.stringify(S.lessonVideos)); }
  if(remote.claudeKey){ S.claudeKey=remote.claudeKey; localStorage.setItem("lingua_claude_key", remote.claudeKey); }
  if(remote.geminiKey){ S.geminiKey=remote.geminiKey; localStorage.setItem("lingua_gemini_key", remote.geminiKey); }
  if(remote.rapidKey){ S.rapidKey=remote.rapidKey; localStorage.setItem("lingua_rapid_key", remote.rapidKey); }
  if(remote.oaiKey){ S.oaiKey=remote.oaiKey; localStorage.setItem("lingua_oai_key", remote.oaiKey); }
  if(remote.elKey){ S.elKey=remote.elKey; localStorage.setItem("lingua_el_key", remote.elKey); }
  if(remote.palette && PALETTES[remote.palette]){ S.palette=remote.palette; localStorage.setItem("lingua_palette", remote.palette); applyTheme(S.theme); }
  if(remote.theme && (remote.theme==="dark"||remote.theme==="light")){ S.theme=remote.theme; localStorage.setItem("lingua_theme", remote.theme); applyTheme(remote.theme); }
}

async function driveFindFile(){
  if(!S.driveToken) return;
  try{
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime)&q=name='${DRIVE_FILENAME}'`,
      {headers:{Authorization:`Bearer ${S.driveToken}`}}
    );
    if(!res.ok) throw new Error("Drive find HTTP "+res.status);
    const data = await res.json();
    if(data.files && data.files.length>0){
      S.driveFileId = data.files[0].id;
      localStorage.setItem("lingua_drive_file_id", S.driveFileId);
    } else {
      S.driveFileId = null;
      localStorage.removeItem("lingua_drive_file_id");
    }
  }catch(e){
    console.error("[Drive] find failed:", e);
  }
}

async function pushToDrive(){
  if(!S.driveToken){ S.driveError="Brak tokenu Drive — połącz ponownie"; S.driveStatus="error"; renderIfStatusVisible(); return false; }
  S.driveStatus="syncing"; renderIfStatusVisible();
  try{
    const payload = buildSyncPayload();
    const body = JSON.stringify(payload);
    const boundary = "lingua-"+Date.now();
    let res;
    if(S.driveFileId){
      const mp =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
        JSON.stringify({mimeType:"application/json"})+`\r\n`+
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n`+
        body+`\r\n--${boundary}--`;
      res = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${S.driveFileId}?uploadType=multipart&fields=id,modifiedTime`,
        {method:"PATCH", headers:{Authorization:`Bearer ${S.driveToken}`, "Content-Type":`multipart/related; boundary=${boundary}`}, body:mp}
      );
    } else {
      const meta = {name: DRIVE_FILENAME, mimeType:"application/json", parents:["appDataFolder"]};
      const mp =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`+
        JSON.stringify(meta)+`\r\n`+
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n`+
        body+`\r\n--${boundary}--`;
      res = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime`,
        {method:"POST", headers:{Authorization:`Bearer ${S.driveToken}`, "Content-Type":`multipart/related; boundary=${boundary}`}, body:mp}
      );
    }
    if(!res.ok){
      const errText = await res.text().catch(()=>"");
      if(res.status === 401){
        driveInvalidateToken();
        S.driveStatus = "disconnected";
        S.driveError = "Token wygasł — kliknij Połącz ponownie";
        renderIfStatusVisible();
        return false;
      }
      throw new Error("Drive push HTTP "+res.status+": "+errText.slice(0,200));
    }
    const data = await res.json();
    S.driveFileId = data.id;
    localStorage.setItem("lingua_drive_file_id", S.driveFileId);
    S.driveLastSync = Date.now();
    S.localLastModified = S.driveLastSync;
    localStorage.setItem("lingua_drive_last_sync", String(S.driveLastSync));
    localStorage.setItem("lingua_local_last_modified", String(S.localLastModified));
    S.driveStatus = "connected";
    S.driveError = "";
    renderIfStatusVisible();
    return true;
  }catch(e){
    S.driveStatus="error"; S.driveError=e.message; renderIfStatusVisible();
    console.error("[Drive] push failed:", e);
    return false;
  }
}

async function pullFromDrive(){
  if(!S.driveToken){ return null; }
  if(!S.driveFileId){
    await driveFindFile();
    if(!S.driveFileId) return null;
  }
  try{
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${S.driveFileId}?alt=media`,
      {headers:{Authorization:`Bearer ${S.driveToken}`}}
    );
    if(!res.ok){
      const errText = await res.text().catch(()=>"");
      if(res.status === 401){
        driveInvalidateToken();
        S.driveStatus = "disconnected";
        S.driveError = "Token wygasł — kliknij Połącz ponownie";
        renderIfStatusVisible();
        return null;
      }
      throw new Error("Drive pull HTTP "+res.status+": "+errText.slice(0,200));
    }
    return await res.json();
  }catch(e){
    console.error("[Drive] pull failed:", e);
    S.driveStatus="error"; S.driveError=e.message; renderIfStatusVisible();
    return null;
  }
}

async function driveSync(_preferRemote){
  S.driveStatus="syncing"; renderIfStatusVisible();
  const remote = await pullFromDrive();
  if(remote && remote.lastModified){
    const localLast = S.localLastModified || 0;
    const remoteLast = remote.lastModified;
    // Local has unsynced changes that are NEWER than remote → push (do not overwrite!)
    if(localLast > remoteLast){
      console.log("[Drive] Local newer ("+localLast+") than remote ("+remoteLast+") — pushing local");
      await pushToDrive();
      return;
    }
    // Remote is newer (or same) → apply remote
    console.log("[Drive] Remote newer or equal ("+remoteLast+" vs local "+localLast+") — pulling remote");
    applyDriveData(remote);
    S.driveLastSync = remoteLast;
    S.localLastModified = remoteLast;
    localStorage.setItem("lingua_drive_last_sync", String(S.driveLastSync));
    localStorage.setItem("lingua_local_last_modified", String(S.localLastModified));
    S.driveStatus="connected"; renderIfStatusVisible();
  } else {
    // No remote file yet → push current local
    await pushToDrive();
  }
}

function connectDrive(){
  if(!S.driveClientId){
    S.driveError = "Wpisz Client ID z Google Cloud Console";
    S.driveStatus="error"; render(); return;
  }
  const tc = initDriveTokenClient();
  if(!tc){
    S.driveError = "Biblioteka Google jeszcze się nie załadowała — odśwież stronę za chwilę";
    S.driveStatus="error"; render(); return;
  }
  S.driveStatus="connecting"; S.driveError=""; render();
  tc.requestAccessToken({prompt: "select_account"});
}

function disconnectDrive(){
  if(S.driveToken && window.google && window.google.accounts && window.google.accounts.oauth2 && window.google.accounts.oauth2.revoke){
    try{ google.accounts.oauth2.revoke(S.driveToken, ()=>{}); }catch(e){}
  }
  S.driveToken = null;
  S.driveTokenExpires = 0;
  S.driveStatus = "disconnected";
  S.driveError = "";
  localStorage.removeItem("lingua_drive_was_connected");
  localStorage.removeItem("lingua_drive_token");
  localStorage.removeItem("lingua_drive_token_expires");
  render();
}

function driveInvalidateToken(){
  S.driveToken = null;
  S.driveTokenExpires = 0;
  localStorage.removeItem("lingua_drive_token");
  localStorage.removeItem("lingua_drive_token_expires");
}

function driveSilentReconnect(retries){
  retries = retries||0;
  if(!S.driveClientId) return;
  if(localStorage.getItem("lingua_drive_was_connected")!=="1") return;
  // Skip if cached token is still valid
  if(S.driveToken && S.driveTokenExpires > Date.now() + 30000){
    console.log("[Drive] Cached token valid until", new Date(S.driveTokenExpires).toLocaleTimeString());
    S.driveStatus = "connected";
    return;
  }
  if(!window.google || !window.google.accounts || !window.google.accounts.oauth2){
    if(retries<20) setTimeout(()=>driveSilentReconnect(retries+1), 300);
    return;
  }
  const tc = initDriveTokenClient();
  if(!tc) return;
  S.driveStatus="connecting"; render();
  try{ tc.requestAccessToken({prompt:""}); }
  catch(e){ S.driveStatus="disconnected"; render(); console.error("[Drive] silent reconnect:",e); }
}

function scheduleDriveSync(){
  // Always bump local timestamp so future reconnect knows local has unsynced changes
  S.localLastModified = Date.now();
  localStorage.setItem("lingua_local_last_modified", String(S.localLastModified));
  if(!S.driveAutoSync || !S.driveToken) return;
  if(_driveSyncTimer) clearTimeout(_driveSyncTimer);
  _driveSyncTimer = setTimeout(()=>{ pushToDrive(); }, 3000);
}

// Re-render only if user can actually see the Drive status (avoids wiping
// imperatively-built UI like AI suggestion panels when background sync ticks)
function renderIfStatusVisible(){
  if(S.screen === "settings") render();
}

function getBrowserVoice(lang){
  const vs=window.speechSynthesis.getVoices();
  const bcp=LANG_BCP[lang].slice(0,2);
  const prefs={
    EN:["Daniel","Samantha","Karen","Martha","Google UK English Female","Google UK English Male"],
    FR:["Thomas","Amélie","Amelie","Marie","Google français","Google French"],
    IT:["Alice","Luca","Google italiano","Google Italian"]
  }[lang]||[];
  for(const p of prefs){const v=vs.find(x=>x.name===p);if(v)return v;}
  const lv=vs.filter(x=>x.lang.toLowerCase().startsWith(bcp));
  return lv.find(x=>/enhanced|premium/i.test(x.name))||lv[0]||null;
}

const _audioCache = new Map();
const _AUDIO_CACHE_MAX = 200;
function _audioCacheStore(key, url){
  if(_audioCache.size >= _AUDIO_CACHE_MAX){
    const oldestKey = _audioCache.keys().next().value;
    const oldUrl = _audioCache.get(oldestKey);
    if(oldUrl) try{URL.revokeObjectURL(oldUrl);}catch(e){}
    _audioCache.delete(oldestKey);
  }
  _audioCache.set(key, url);
}
function _audioCachePlay(url){
  return new Promise((res, rej) => {
    const a = new Audio(url);
    a.playbackRate = S.voiceRate;
    a.onended = ()=>res();
    a.onerror = rej;
    a.play().catch(rej);
  });
}

function browserSpeak(text,lang){
  return new Promise(res=>{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const v=getBrowserVoice(lang);
    if(v){u.voice=v;u.lang=v.lang;}
    else{u.lang=LANG_BCP[lang];}
    u.rate=S.voiceRate;u.pitch=1.0;
    u.onend=res;u.onerror=res;
    window.speechSynthesis.speak(u);
  });
}

async function elSpeak(text,lang,voiceId){
  const vid=voiceId||EL_VOICES[lang].female.id;
  const cacheKey = "el|"+lang+"|"+vid+"|"+text;
  const cached = _audioCache.get(cacheKey);
  if(cached) return _audioCachePlay(cached);
  const r=await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${vid}`,{
    method:"POST",
    headers:{"xi-api-key":S.elKey,"Content-Type":"application/json"},
    body:JSON.stringify({text,model_id:"eleven_multilingual_v2",
      voice_settings:{stability:0.35,similarity_boost:0.75,style:0.45,use_speaker_boost:true}})
  });
  if(!r.ok)throw new Error("EL "+r.status);
  const blob=await r.blob();
  const url=URL.createObjectURL(blob);
  _audioCacheStore(cacheKey, url);
  return _audioCachePlay(url);
}

async function oaiSpeak(text, voiceId){
  const cacheKey = "oai|"+voiceId+"|"+S.voiceRate+"|"+text;
  let url = _audioCache.get(cacheKey);
  if(!url){
    const r = await fetch("https://api.openai.com/v1/audio/speech",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+S.oaiKey},
      body:JSON.stringify({model:"tts-1", input:text, voice:voiceId, speed:S.voiceRate})
    });
    if(!r.ok) throw new Error("OAI TTS "+r.status);
    const blob = await r.blob();
    url = URL.createObjectURL(blob);
    _audioCacheStore(cacheKey, url);
  }
  return new Promise((res,rej)=>{
    const a=new Audio(url);
    a.addEventListener('loadedmetadata', ()=>{
      const durationMs = a.duration * 1000;
      const lineIdx = S.playingLine;
      const spans = document.querySelectorAll(`[id^="word-${lineIdx}-"]`);
      if(spans.length){
        const timePerWord = durationMs / spans.length;
        spans.forEach((span, i)=>{
          setTimeout(()=>{
            document.querySelectorAll('.word-active').forEach(s=>s.classList.remove('word-active'));
            span.classList.add('word-active');
          }, i * timePerWord);
        });
        setTimeout(()=>document.querySelectorAll('.word-active').forEach(s=>s.classList.remove('word-active')), durationMs + 100);
      }
    });
    a.onended=()=>res();
    a.onerror=rej; a.play();
  });
}

async function speak(text, lang, speakerName){
  const isAleksandra = isFemaleVoice(speakerName);
  function startWordHighlight(){
    const lineIdx = S.playingLine;
    if(lineIdx < 0) return;
    const spans = document.querySelectorAll(`[id^="word-${lineIdx}-"]`);
    if(!spans.length) return;
    spans.forEach((span, i)=>{
      setTimeout(()=>{
        document.querySelectorAll('.word-active').forEach(s=>s.classList.remove('word-active'));
        span.classList.add('word-active');
      }, i * 300);
    });
    setTimeout(()=>document.querySelectorAll('.word-active').forEach(s=>s.classList.remove('word-active')), spans.length * 300 + 100);
  }
  try{
    if(S.ttsEngine==="oai" && S.oaiKey){
      const voice = isAleksandra ? S.oaiVoiceFemale : S.oaiVoiceMale;
      await oaiSpeak(text, voice);
    } else if(S.ttsEngine==="el" && S.elKey){
      const vid = getVoiceId(lang, speakerName||"");
      startWordHighlight();
      await elSpeak(text, lang, vid);
    } else {
      startWordHighlight();
      await browserSpeak(text, lang);
    }
  } catch(e){
    console.log("TTS err, fallback:", e.message);
    startWordHighlight();
    await browserSpeak(text, lang);
  }
}

async function playDialog(dialog,lang){
  const flag={v:false};
  set({playing:true,abort:flag,playingLine:0});
  for(let i=0;i<dialog.length;i++){
    if(flag.v)break;
    set({playingLine:i});
    const lineEl=document.getElementById("dline-"+i);
    if(lineEl) lineEl.scrollIntoView({behavior:"smooth",block:"center"});
    await speak(dialog[i].l, lang, dialog[i].s);
    if(flag.v)break;
    // longer pause between different speakers, shorter for same speaker
    const nextSpeaker = dialog[i+1]?.s;
    const pause = nextSpeaker && nextSpeaker !== dialog[i].s ? 350 : 180;
    await new Promise(r=>setTimeout(r,pause));
  }
  set({playing:false,playingLine:-1});
}

    if(flag.v) break;

let _ytPlayer = null;
let _ytHighlightInterval = null;
let _ytApiReady = false;
let _ytLastActiveIdx = -1;
window.onYouTubeIframeAPIReady = function(){ _ytApiReady = true; console.log("[YT] API ready"); };

function destroyYtPlayer(){
  if(_ytHighlightInterval){ clearInterval(_ytHighlightInterval); _ytHighlightInterval=null; }
  if(_ytPlayer){
    try{ _ytPlayer.destroy(); }catch(e){}
    _ytPlayer = null;
  }
  _ytLastActiveIdx = -1;
}

function initYtPlayer(videoId, containerId){
  destroyYtPlayer();
  const start = ()=>{
    try{
      _ytPlayer = new YT.Player(containerId,{
        videoId: videoId,
        playerVars:{rel:0, modestbranding:1, playsinline:1},
        events:{
          onReady: ()=>{
            console.log("[YT] Player ready for "+videoId);
            _ytHighlightInterval = setInterval(highlightCurrentCue, 200);
          }
        }
      });
    }catch(e){ console.error("[YT] init failed:",e); }
  };
  if(_ytApiReady && window.YT && window.YT.Player) start();
  else {
    const wait = setInterval(()=>{
      if(_ytApiReady && window.YT && window.YT.Player){ clearInterval(wait); start(); }
    },120);
    setTimeout(()=>clearInterval(wait), 8000);
  }
}

function highlightCurrentCue(){
  if(!_ytPlayer || typeof _ytPlayer.getCurrentTime !== "function") return;
  let t;
  try{ t = _ytPlayer.getCurrentTime(); }catch(e){ return; }
  const cues = document.querySelectorAll(".film-cue");
  if(!cues.length) return;
  let activeIdx = -1;
  cues.forEach((cue,i)=>{
    const s = parseFloat(cue.dataset.start);
    const e = parseFloat(cue.dataset.end);
    if(t >= s && t < e + 0.3) activeIdx = i;
  });
  if(activeIdx !== _ytLastActiveIdx){
    cues.forEach(c=>c.classList.remove("film-cue-active"));
    if(activeIdx >= 0){
      const c = cues[activeIdx];
      c.classList.add("film-cue-active");
      const col = c.closest(".film-cues-col");
      if(col){
        const colRect = col.getBoundingClientRect();
        const cRect = c.getBoundingClientRect();
        const offset = cRect.top - colRect.top - col.clientHeight/2 + c.clientHeight/2;
        col.scrollBy({top: offset, behavior:"smooth"});
      }
    }
    _ytLastActiveIdx = activeIdx;
  }
}

function seekYtTo(seconds){
  if(_ytPlayer && _ytPlayer.seekTo){
    _ytPlayer.seekTo(seconds, true);
    if(_ytPlayer.playVideo) _ytPlayer.playVideo();
  }
}

function tolerantParseJson(text){
  if(!text) throw new Error("Pusta odpowiedź");
  // Try standard parse first
  const m = text.match(/\{[\s\S]*\}/);
  if(m){
    try { return JSON.parse(m[0]); } catch(e){}
  }
  // Recovery: extract individual items from "items":[...] by brace-counting
  const arrIdx = text.search(/"items"\s*:\s*\[/);
  if(arrIdx < 0) throw new Error("Brak tablicy items w odpowiedzi");
  const arrStart = text.indexOf("[", arrIdx) + 1;
  const items = [];
  let depth = 0, start = -1, inStr = false, esc = false;
  for(let i = arrStart; i < text.length; i++){
    const ch = text[i];
    if(inStr){
      if(esc){ esc = false; continue; }
      if(ch === "\\"){ esc = true; continue; }
      if(ch === '"'){ inStr = false; }
      continue;
    }
    if(ch === '"'){ inStr = true; continue; }
    if(ch === "{"){
      if(depth === 0) start = i;
      depth++;
    } else if(ch === "}"){
      depth--;
      if(depth === 0 && start >= 0){
        try { items.push(JSON.parse(text.slice(start, i+1))); } catch(e){}
        start = -1;
      }
    } else if(ch === "]" && depth === 0){
      break;
    }
  }
  if(items.length === 0) throw new Error("Nie udało się odzyskać żadnego elementu z JSON");
  return {items, _recovered: true};
}

function rawTextToPlain(rawText){
  if(!rawText) return "";
  if(!/<[a-z][\s\S]*?>/i.test(rawText)) return rawText;
  let s = String(rawText)
    .replace(/<br\s*\/?>/gi, "\n")
    .replace(/<\/(div|p|li|h[1-6]|tr)>/gi, "\n")
    .replace(/<[^>]+>/g, "");
  const tmp = document.createElement("div");
  tmp.innerHTML = s;
  return (tmp.textContent || "").replace(/\n{3,}/g, "\n\n").trim();
}

async function extractPdfText(file){
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    const pages = [];
    const Y_TOLERANCE = 2;
    for(let i=1;i<=pdf.numPages;i++){
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const lines = [];
      let buf = [];
      let curY = null;
      for(const item of content.items){
        const y = item.transform ? item.transform[5] : null;
        if(curY === null){
          curY = y;
          if(item.str) buf.push(item.str);
        } else if(y !== null && Math.abs(y - curY) <= Y_TOLERANCE){
          if(item.str) buf.push(item.str);
        } else {
          lines.push(buf.join(" ").trim());
          buf = item.str ? [item.str] : [];
          curY = y;
        }
        if(item.hasEOL){
          if(buf.length) lines.push(buf.join(" ").trim());
          buf = [];
          curY = null;
        }
      }
      if(buf.length) lines.push(buf.join(" ").trim());
      pages.push(lines.filter(l=>l).join("\n"));
    }
    return pages.join("\n\n").trim();
  }catch(e){
    throw new Error("Nie można odczytać PDF: "+e.message);
  }
}
async function callGemini(prompt, geminiKey){
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
    {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.3,maxOutputTokens:4000}
      })
    }
  );
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error("Gemini API błąd "+res.status+": "+(err?.error?.message||"sprawdź klucz API"));
  }
  const data = await res.json();
  const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text
    || data?.candidates?.[0]?.output
    || data?.text
    || "";
  if(!rawText) throw new Error("Gemini nie zwrócił tekstu — spróbuj ponownie");
  const jsonMatch = rawText.match(/\{[\s\S]*\}/);
  if(!jsonMatch) throw new Error("Gemini nie zwrócił poprawnego JSON — spróbuj ponownie");
  return JSON.parse(jsonMatch[0]);
}

}

{"title":"tytuł sceny np. Friends S01E01 - scena w kawiarni","level":"A2","topic":"temat lekcji po polsku","rawText":"pełna dosłowna transkrypcja nagrania","dialog":[{"s":"imię/nazwa postaci","l":"dokładny tekst w języku obcym","t":"naturalne tłumaczenie po polsku"}],"vocab":[{"w":"ważny zwrot z sceny","tr":"tłumaczenie","ipa":"wymowa IPA","pl":"wymowa dla Polaków","ex":"zdanie z fragmentu","exT":"tłumaczenie"}],"fill":[{"s":"zdanie z ___ luką","a":"brakujące słowo","h":"wskazówka po polsku","cat":"text"},{"s":"gramatyczne z ___","a":"odpowiedź","h":"wskazówka","cat":"grammar"}],"grammar":[{"rule":"zasada gramatyczna widoczna w scenie","ex":"przykład z fragmentu","exT":"tłumaczenie","note":"wyjaśnienie po polsku"}]}`;

  try{
    // Convert file to base64
    const b64 = (await fileToDataUrl(file)).split(",")[1];
    const mediaType = file.type || (isVideo ? "video/mp4" : "audio/mpeg");

    const parts = [
      {inline_data:{mime_type:mediaType, data:b64}},
      {text:PROMPT}
    ];

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${S.geminiKey}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts}]})
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error((err.error?.message)||"API "+res.status);
    }
    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text;
    const clean = text.replace(/```json|```/g,"").trim();
    const json = JSON.parse(clean);
    const lessonId = "film_"+Date.now();
    json.id = lessonId;
    json.type = "dialog";
    json.fromFilm = true;
    json.source = "video";
    json.hasVideo = isVideo;

    // Save video to IndexedDB if it's a video file
    if(isVideo){
      const videoKey = "video_"+lessonId;
      await saveVideo(videoKey, file);
      const lv = Object.assign({}, S.lessonVideos);
      lv[lessonId] = videoKey;
      localStorage.setItem("lingua_lesson_videos", JSON.stringify(lv));
      set({lessonVideos:lv});
    }

    saveMyLesson(lang, json);
    set({filmProcessing:false, filmFile:null, filmUploadStep:3});
  } catch(e){
    console.error("processFilm error:", e);
    set({filmProcessing:false, filmError:"Błąd: "+e.message});
  }
}

// ── DOM HELPER ───────────────────────────────────────────────────────────────
function h(tag,props,...ch){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(props||{})){
    if(k==="onclick")el.onclick=v;
    else if(k==="oninput")el.oninput=v;
    else if(k==="onkeydown")el.onkeydown=v;
    else if(k==="onchange")el.onchange=v;
    else if(k==="class")el.className=v;
    else if(k==="style")el.style.cssText=v;
    else el.setAttribute(k,v);
  }
  for(const c of ch){
    if(c==null)continue;
    if(typeof c==="string")el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  }
  return el;
}

          wordPool.appendChild(h("button",{style:"padding:6px 14px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .15s",

        }
      }
    });
    bw.appendChild(wordPool);
    if(!S.buildSubmitted&&selected.length===card.words.length){
      const userSentence=selected.join(" ");
      const isCorrect=userSentence.toLowerCase()===card.words.join(" ").toLowerCase();
      bw.appendChild(h("button",{class:"check-btn",onclick:()=>{
        set({buildSubmitted:true,score:{c:isCorrect?S.score.c+1:S.score.c,t:S.score.t+1}});
      }},"Sprawdź"));
    }
    if(S.buildSubmitted){
      const userSentence=selected.join(" ");
      const isCorrect=userSentence.toLowerCase()===card.words.join(" ").toLowerCase();
      bw.appendChild(h("div",{class:"feedback "+(isCorrect?"ok":"bad")},isCorrect?"✓ Poprawnie!":"✗ Poprawna kolejność: "+card.words.join(" ")));
      bw.appendChild(h("button",{class:"next-btn",onclick:()=>{set({buildSelected:[],buildSubmitted:false});nextCard();}},"Następne →"));
    }
    main.appendChild(bw);
  }

  w.appendChild(main);
  return w;
}

  return wrap;

function showWordPopup(wordRaw, wordClean, lang, anchorEl){
  document.getElementById("word-popup")?.remove();
  document.removeEventListener("mousedown", showWordPopup._outside);

  const popup = document.createElement("div");
  popup.id = "word-popup";
  popup.className = "word-popup";

  // Position above anchor
  const rect = anchorEl.getBoundingClientRect();
  popup.style.left = Math.min(rect.left, window.innerWidth - 320) + "px";
  popup.style.top = (rect.top - 10) + "px";
  popup.style.transform = "translateY(-100%)";

  // Loading state
  popup.innerHTML = '<div style="color:var(--text3);font-size:13px">Ładowanie...</div>';
  document.body.appendChild(popup);

  const wordStatus = JSON.parse(localStorage.getItem("lingua_word_status")||"{}");
  const key = wordClean + "_" + lang;

  async function fillPopup(data){
    popup.innerHTML = "";
    const wordEl = document.createElement("div");
    wordEl.className = "word-popup-word";
    wordEl.textContent = data.word || wordRaw;
    wordEl.onclick = ()=> speak(data.word || wordRaw, lang, "");
    popup.appendChild(wordEl);
    if(data.ipa){ const d=document.createElement("div"); d.className="word-popup-ipa"; d.textContent=data.ipa; popup.appendChild(d); }
    if(data.pl){ const d=document.createElement("div"); d.className="word-popup-pl"; d.textContent=data.pl; popup.appendChild(d); }
    if(data.example){ const d=document.createElement("div"); d.className="word-popup-ex"; d.textContent=data.example; popup.appendChild(d); }
    const btns = document.createElement("div"); btns.className="word-popup-btns";
    const knownBtn = document.createElement("button"); knownBtn.className="word-popup-known"; knownBtn.textContent="✓ Znam";
    knownBtn.onclick = ()=> markWord(key, "known", wordClean, lang);
    const learningBtn = document.createElement("button"); learningBtn.className="word-popup-learning"; learningBtn.textContent="📖 Uczę się";
    learningBtn.onclick = ()=> markWord(key, "learning", wordClean, lang);
    btns.appendChild(knownBtn); btns.appendChild(learningBtn);
    popup.appendChild(btns);
  }

  // Check lesson vocab first
  const lesson = S.lesson;
  const vocabEntry = lesson?.vocab?.find(v => v.w.toLowerCase() === wordClean);
  if(vocabEntry){
    fillPopup({word: vocabEntry.w, ipa: vocabEntry.ipa, pl: vocabEntry.tr, example: vocabEntry.ex});
  } else if(S.geminiKey){
    const prompt = `Słowo: "${wordRaw}", język: ${lang}. TYLKO JSON: {"word":"...","ipa":"...","pl":"...","example":"..."}`;
    fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${S.geminiKey}`,{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    }).then(r=>r.json()).then(data=>{
      const txt = data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
      const clean = txt.replace(/```json|```/g,"").trim();
      try{ fillPopup(JSON.parse(clean)); } catch{ fillPopup({word:wordRaw,pl:"",ipa:"",example:""}); }
    }).catch(()=>fillPopup({word:wordRaw,pl:"",ipa:"",example:""}));
  } else {
    fillPopup({word:wordRaw,pl:"(brak klucza Gemini)",ipa:"",example:""});
  }

  showWordPopup._outside = (e)=>{ if(!popup.contains(e.target) && e.target!==anchorEl){ popup.remove(); document.removeEventListener("mousedown", showWordPopup._outside); } };
  setTimeout(()=>document.addEventListener("mousedown", showWordPopup._outside), 10);
}

function markWord(key, status, wordClean, lang){
  const ws = JSON.parse(localStorage.getItem("lingua_word_status")||"{}");
  ws[key] = status;
  localStorage.setItem("lingua_word_status", JSON.stringify(ws));
  // Update all spans for this word
  document.querySelectorAll(".word-span").forEach(span=>{
    const spKey = (span.dataset.wordclean||"") + "_" + lang;
    if(spKey === key){
      span.classList.remove("word-known","word-learning");
      span.classList.add(status==="known"?"word-known":"word-learning");
    }
  });
  document.getElementById("word-popup")?.remove();
}

    spkBtn.textContent = "♪";

  closeBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:22px;color:var(--text3);line-height:1;padding:0 4px";
  closeBtn.textContent = "✕";
  closeBtn.onclick = ()=>overlay.remove();
  head.appendChild(closeBtn);
  modal.appendChild(head);

  function mkInp(ph, val, marginBottom){
    const inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = ph;
    inp.className = "key-inp";
    inp.style.marginBottom = marginBottom;
    inp.value = val || "";
    return inp;
  }
  const wInp  = mkInp(arrayKey==="phrases"?"Zwrot (obcojęzyczne)":"Słowo (obcojęzyczne)", item.w, "8px");
  const trInp = mkInp("Tłumaczenie po polsku", item.tr, "8px");
  const ipaInp = mkInp("Wymowa IPA (opcjonalnie)", item.ipa, "8px");
  const plInp = mkInp("Jak czytać po polsku (opcjonalnie)", item.pl, "8px");
  modal.appendChild(wInp);
  modal.appendChild(trInp);
  modal.appendChild(ipaInp);
  modal.appendChild(plInp);

  // Examples section
  const exHead = document.createElement("div");
  exHead.style.cssText = "font-size:11px;color:var(--text3);margin:14px 0 8px 0;letter-spacing:.06em;text-transform:uppercase";
  exHead.textContent = "Przykłady użycia";
  modal.appendChild(exHead);

  const examples = [];
  if(item.ex || item.exT) examples.push({ex:item.ex||"", exT:item.exT||""});
  (item.extraExamples||[]).forEach(e=>examples.push({ex:e.ex||"", exT:e.exT||""}));
  if(examples.length === 0) examples.push({ex:"", exT:""});

  const exContainer = document.createElement("div");
  function rebuildExamples(){
    exContainer.innerHTML = "";
    examples.forEach((exObj, exIdx)=>{
      const exRow = document.createElement("div");
      exRow.style.cssText = "display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;margin-bottom:8px;align-items:start";
      const exIn = document.createElement("input");
      exIn.type = "text"; exIn.className = "key-inp"; exIn.placeholder = "Przykład w "+langName;
      exIn.value = exObj.ex || "";
      exIn.oninput = ()=>{ examples[exIdx].ex = exIn.value; };
      const exTIn = document.createElement("input");
      exTIn.type = "text"; exTIn.className = "key-inp"; exTIn.placeholder = "Tłumaczenie po polsku";
      exTIn.value = exObj.exT || "";
      exTIn.oninput = ()=>{ examples[exIdx].exT = exTIn.value; };
      const rmBtn = document.createElement("button");
      rmBtn.className = "sbtn";
      rmBtn.style.cssText = "width:28px;padding:0;font-size:14px;border-color:var(--red);color:var(--red);align-self:start";
      rmBtn.textContent = "✕";
      rmBtn.title = "Usuń ten przykład";
      rmBtn.onclick = ()=>{
        examples.splice(exIdx, 1);
        if(examples.length===0) examples.push({ex:"",exT:""});
        rebuildExamples();
      };
      exRow.appendChild(exIn);
      exRow.appendChild(exTIn);
      exRow.appendChild(rmBtn);
      exContainer.appendChild(exRow);
    });
  }
  rebuildExamples();
  modal.appendChild(exContainer);

  const addExBtn = document.createElement("button");
  addExBtn.className = "sbtn";
  addExBtn.style.cssText = "font-size:11px;border-color:var(--gold);color:var(--gold);margin-bottom:18px";
  addExBtn.textContent = "+ Dodaj kolejny przykład";
  addExBtn.onclick = ()=>{ examples.push({ex:"",exT:""}); rebuildExamples(); };
  modal.appendChild(addExBtn);

  // Buttons
  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:flex;gap:10px;margin-top:8px";
  const saveBtn = document.createElement("button");
  saveBtn.className = "primary";
  saveBtn.textContent = "💾 Zapisz zmiany";
  saveBtn.onclick = ()=>{
    const w = wInp.value.trim();
    const tr = trInp.value.trim();
    if(!w || !tr){ alert("Słowo/zwrot i tłumaczenie są wymagane"); return; }
    const cleanExamples = examples.filter(e=>(e.ex||"").trim() || (e.exT||"").trim()).map(e=>({ex:(e.ex||"").trim(), exT:(e.exT||"").trim()}));
    const newItem = { w, tr, ipa: ipaInp.value.trim(), pl: plInp.value.trim() };
    if(cleanExamples.length > 0){
      newItem.ex = cleanExamples[0].ex;
      newItem.exT = cleanExamples[0].exT;
      if(cleanExamples.length > 1) newItem.extraExamples = cleanExamples.slice(1);
    } else {
      newItem.ex = ""; newItem.exT = "";
    }
    lesson[arrayKey][idx] = newItem;
    const ml = Object.assign({}, S.myLessons);
    const li = (ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
    if(li>=0){
      ml[S.lang][li][arrayKey] = lesson[arrayKey];
      localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
      scheduleDriveSync();
      set({myLessons: ml});
    }
    overlay.remove();
  };
  const cancelBtn = document.createElement("button");
  cancelBtn.className = "sbtn";
  cancelBtn.textContent = "Anuluj";
  cancelBtn.onclick = ()=>overlay.remove();
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  modal.appendChild(btnRow);

  // Close on backdrop click (but not modal click)
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  document.body.appendChild(overlay);
  setTimeout(()=>wInp.focus(), 50);
}

function renderAddEntryForm(lesson, arrayKey, lang){
  const label = arrayKey==="phrases" ? "zwrot" : "słówko";
  const wrap = h("div",{style:"max-width:760px;margin-bottom:20px"});
  const formBox = h("div",{style:"display:none;margin-top:14px;padding:18px;border:1px solid var(--gold);border-radius:8px;background:var(--surface)"});
  const toggleBtn = h("button",{class:"sbtn",style:"border-color:var(--gold);color:var(--gold)"},"+ Dodaj "+label+" ręcznie");
  const mkInp = (ph, marginBottom) => h("input",{type:"text",placeholder:ph,class:"key-inp",style:"margin-bottom:"+marginBottom});
  const wInp = mkInp(arrayKey==="phrases" ? "Zwrot lub wyrażenie (obcojęzyczne)" : "Słowo (obcojęzyczne)", "8px");
  const trInp = mkInp("Tłumaczenie po polsku", "8px");
  const ipaInp = mkInp("Wymowa IPA (opcjonalnie, np. /ˈhɛloʊ/)", "8px");
  const plInp = mkInp("Jak czytać po polsku (opcjonalnie, np. „helou\")", "8px");
  const exInp = mkInp("Przykład użycia w zdaniu (opcjonalnie)", "8px");
  const exTInp = mkInp("Tłumaczenie przykładu (opcjonalnie)", "14px");
  formBox.appendChild(h("div",{class:"sec-label",style:"margin-bottom:12px"},"Nowy "+label));
  formBox.appendChild(wInp);
  formBox.appendChild(trInp);
  formBox.appendChild(ipaInp);
  formBox.appendChild(plInp);
  formBox.appendChild(exInp);
  formBox.appendChild(exTInp);
  const btnRow = h("div",{style:"display:flex;gap:10px;align-items:center;flex-wrap:wrap"});
  const clearForm = ()=>{ [wInp,trInp,ipaInp,plInp,exInp,exTInp].forEach(i=>i.value=""); };
  const closeForm = ()=>{ formBox.style.display="none"; toggleBtn.textContent="+ Dodaj "+label+" ręcznie"; };

  async function aiFillPronunciation(word){
    if(!S.claudeKey) return null;
    const langName = {EN:"angielskim",FR:"francuskim",IT:"włoskim",DE:"niemieckim",ES:"hiszpańskim"}[lang]||lang;
    const promptText = `Podaj wymowę dla ${arrayKey==="phrases"?"zwrotu":"słowa"} "${word}" w języku ${langName}. Pole "ipa" to standard międzynarodowy fonetyczny, pole "pl" to fonetyka czytana intuicyjnie po polsku (np. dla angielskiego "hello" → "helou"). Odpowiedz TYLKO czystym JSON, bez markdown, bez komentarzy: {"ipa":"/.../","pl":"jak czytać po polsku"}`;
    try{
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"x-api-key":S.claudeKey,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:200,messages:[{role:"user",content:[{type:"text",text:promptText}]}]})
      });
      if(!res.ok) return null;
      const data = await res.json();
      const m = data.content[0].text.match(/\{[\s\S]*\}/);
      if(!m) return null;
      const parsed = JSON.parse(m[0]);
      return {ipa: parsed.ipa||"", pl: parsed.pl||""};
    }catch(e){ console.error("[Lingua] AI fill failed:",e); return null; }
  }

  const aiBtn = h("button",{class:"sbtn",style:"border-color:var(--gold);color:var(--gold)"},"✨ Uzupełnij wymowę z AI");
  aiBtn.onclick = async ()=>{
    const w=(wInp.value||"").trim();
    if(!w){ alert("Najpierw wpisz "+(arrayKey==="phrases"?"zwrot":"słowo")); wInp.focus(); return; }
    if(!S.claudeKey){ alert("Wymagany klucz Claude API w Ustawieniach (sekcja Anthropic)"); return; }
    aiBtn.disabled=true; aiBtn.textContent="⏳ Generuję...";
    const r = await aiFillPronunciation(w);
    if(r){
      if(r.ipa) ipaInp.value = r.ipa;
      if(r.pl) plInp.value = r.pl;
      aiBtn.textContent = "✓ Uzupełnione"; aiBtn.style.color="var(--ok-text)"; aiBtn.style.borderColor="var(--ok-text)";
      setTimeout(()=>{ aiBtn.textContent="✨ Uzupełnij wymowę z AI"; aiBtn.style.color="var(--gold)"; aiBtn.style.borderColor="var(--gold)"; aiBtn.disabled=false; },1500);
    } else {
      aiBtn.textContent="⚠ Błąd — spróbuj ponownie"; aiBtn.style.color="var(--err-text)"; aiBtn.style.borderColor="var(--err-text)";
      setTimeout(()=>{ aiBtn.textContent="✨ Uzupełnij wymowę z AI"; aiBtn.style.color="var(--gold)"; aiBtn.style.borderColor="var(--gold)"; aiBtn.disabled=false; },2000);
    }
  };

  const saveBtn = h("button",{class:"primary"},"💾 Zapisz i dodaj kolejny");
  saveBtn.onclick = async ()=>{
    const w=(wInp.value||"").trim(), tr=(trInp.value||"").trim();
    if(!w||!tr){ alert("Wpisz minimum "+(arrayKey==="phrases"?"zwrot i jego tłumaczenie":"słowo i jego tłumaczenie")); return; }
    if(!lesson[arrayKey]) lesson[arrayKey]=[];
    if(lesson[arrayKey].some(v=>v.w===w)){ if(!confirm("\""+w+"\" już istnieje w tej lekcji. Dodać duplikat?")) return; }
    let ipa=(ipaInp.value||"").trim(), pl=(plInp.value||"").trim();
    if((!ipa || !pl) && S.claudeKey){
      saveBtn.disabled=true; saveBtn.textContent="⏳ Uzupełniam wymowę...";
      const r = await aiFillPronunciation(w);
      if(r){ if(!ipa && r.ipa) ipa=r.ipa; if(!pl && r.pl) pl=r.pl; }
      saveBtn.disabled=false; saveBtn.textContent="💾 Zapisz i dodaj kolejny";
    }
    lesson[arrayKey].push({w,tr,ipa,pl,ex:(exInp.value||"").trim(),exT:(exTInp.value||"").trim()});
    const ml=Object.assign({},S.myLessons);
    const li=(ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
    if(li>=0){ ml[S.lang][li][arrayKey]=lesson[arrayKey]; set({myLessons:ml}); localStorage.setItem("lingua_my_lessons",JSON.stringify(ml)); scheduleDriveSync(); }
    clearForm();
    setTimeout(()=>wInp.focus(),50);
  };
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(aiBtn);
  btnRow.appendChild(h("button",{class:"sbtn",onclick:closeForm},"Zamknij"));
  formBox.appendChild(btnRow);
  toggleBtn.onclick = ()=>{
    if(formBox.style.display==="none"){
      formBox.style.display="block";
      toggleBtn.textContent="✕ Zamknij formularz";
      setTimeout(()=>wInp.focus(),50);
    } else closeForm();
  };
  wrap.appendChild(toggleBtn);
  wrap.appendChild(formBox);
  return wrap;
}

function renderUploadPanel(){
  const{uploadStep,uploadFile,uploadPreview,uploadProcessing,uploadError,uploadLang,claudeKey}=S;
  const panel=h("div",{class:"upload-panel"});
  const ph=h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"});
  ph.appendChild(h("div",{},
    h("div",{class:"upload-title"},"Wgraj własną lekcję"),
    h("div",{class:"upload-sub"},"Zdjęcie, PDF, plik .md/.txt lub tekst — Claude przeanalizuje i stworzy lekcję")
  ));
  ph.appendChild(h("button",{style:"background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3)",onclick:()=>set({showUpload:false})},"✕"));
  panel.appendChild(ph);

  if(!claudeKey){
    panel.appendChild(h("div",{class:"msg-err",style:"margin-bottom:0"},"⚠️ Potrzebujesz klucza Anthropic API — wejdź w Ustawienia lektora."));
    return panel;
  }

  if(uploadStep===0){
    const ug=h("div",{class:"upload-grid"});
    // Opcja 1: Zdjęcie / Skan
    const imgL=h("label",{class:"upload-opt"});
    imgL.appendChild(h("div",{class:"uicon"},"📸"));
    imgL.appendChild(h("div",{class:"ulabel"},"Zdjęcie / Skan"));
    imgL.appendChild(h("div",{class:"udesc"},"JPG, PNG"));
    const ii=h("input",{type:"file",accept:"image/*",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    imgL.appendChild(ii);
    ug.appendChild(imgL);
    // Opcja 2: PDF
    const pdfL=h("label",{class:"upload-opt"});
    pdfL.appendChild(h("div",{class:"uicon"},"📄"));
    pdfL.appendChild(h("div",{class:"ulabel"},"Plik PDF"));
    pdfL.appendChild(h("div",{class:"udesc"},"PDF"));
    const pi=h("input",{type:"file",accept:".pdf",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    pdfL.appendChild(pi);
    ug.appendChild(pdfL);
    // Opcja 3: Plik .md / .txt
    const mdL=h("label",{class:"upload-opt"});
    mdL.appendChild(h("div",{class:"uicon"},"📝"));
    mdL.appendChild(h("div",{class:"ulabel"},"Plik tekstowy"));
    mdL.appendChild(h("div",{class:"udesc"},"MD, TXT, Markdown"));
    const mi=h("input",{type:"file",accept:".md,.markdown,.txt,text/plain,text/markdown",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    mdL.appendChild(mi);
    ug.appendChild(mdL);
    // Opcja 4: Własny tekst / notatki
    const txtOpt=h("div",{class:"upload-opt",style:"cursor:pointer",onclick:()=>set({uploadStep:"text"})});
    txtOpt.appendChild(h("div",{class:"uicon"},"✏️"));
    txtOpt.appendChild(h("div",{class:"ulabel"},"Własny tekst"));
    txtOpt.appendChild(h("div",{class:"udesc"},"Wpisz lub wklej notatki"));
    ug.appendChild(txtOpt);
    panel.appendChild(ug);
  }

  // Krok "text" — pełny edytor tekstu
  if(uploadStep==="text"){
    panel.appendChild(h("button",{class:"back-btn",style:"margin-bottom:12px",onclick:()=>set({uploadStep:0,uploadPreview:null})},"← Wróć do wyboru"));
    panel.appendChild(h("div",{style:"font-size:14px;color:var(--text);font-weight:500;margin-bottom:6px"},"✏️ Wpisz lub wklej swój tekst"));
    panel.appendChild(h("div",{style:"font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6"},"Wpisz notatki, dialog, słówka, zdania — AI stworzy z nich kompletną lekcję ze słownikiem, fiszkami, ćwiczeniami, gramatyką i czytaniem."));
    const ta=h("textarea",{style:"width:100%;min-height:220px;padding:16px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;color:var(--text);line-height:1.7;border-radius:2px",
      placeholder:"Wpisz tutaj swoje notatki, tekst z lekcji, dialog, listę słówek...\n\nPrzykład:\nBonjour, comment allez-vous?\nJe suis très content de vous voir.\nOù est la bibliothèque?",
      oninput:(e)=>set({uploadPreview:e.target.value})});
    if(S.uploadPreview&&typeof S.uploadPreview==="string") ta.value=S.uploadPreview;
    panel.appendChild(ta);
    const charCount=S.uploadPreview&&typeof S.uploadPreview==="string"?S.uploadPreview.length:0;
    panel.appendChild(h("div",{style:"font-size:11px;color:var(--text3);margin-top:6px;text-align:right"},charCount+" znaków"+(charCount<20?" · minimum 20 znaków":"")));
    if(charCount>=20){
      panel.appendChild(h("button",{class:"check-btn",style:"margin-top:14px;width:100%;padding:14px;font-size:14px",onclick:()=>{set({uploadStep:1,uploadFile:null});processUpload();}},"✨ Stwórz lekcję z tego tekstu"));
    }
  }

  if(uploadStep===1&&uploadFile){
    panel.appendChild(h("div",{class:"msg-ok"},"✓ "+uploadFile.name+" ("+Math.round(uploadFile.size/1024)+" KB)"));
    if(!uploadProcessing){
      panel.appendChild(h("button",{class:"check-btn",onclick:processUpload},"Analizuj z Claude"));
    } else {
      panel.appendChild(h("div",{style:"padding:20px;text-align:center;color:var(--ink3);font-size:13px"},"⏳ Trwa analiza tekstu..."));
    }
  }

  if(uploadStep===1&&!uploadFile){
    if(uploadProcessing){
      panel.appendChild(h("div",{style:"padding:28px;text-align:center;color:var(--text2);font-size:13px"},
        h("div",{style:"font-size:28px;margin-bottom:8px"},"✨"),
        h("div",{},"Tworzę lekcję z Twojego tekstu..."),
        h("div",{style:"font-size:11px;color:var(--text3);margin-top:6px"},"słownik, fiszki, ćwiczenia, gramatyka — to potrwa kilka sekund")
      ));
    }
  }

  if(uploadError) panel.appendChild(h("div",{class:"msg-err"},uploadError));

  if(uploadStep===2&&uploadPreview&&typeof uploadPreview==="object"){
    const prev=uploadPreview;
    panel.appendChild(h("div",{class:"msg-ok"},
      h("div",{style:"font-weight:500;margin-bottom:4px"},prev.title||"Bez tytułu"),
      h("div",{style:"font-size:12px"},
        (prev.level||"")+" · "+(prev.dialog||[]).length+" linii · "+(prev.vocab||[]).length+" słówek · "+(prev.grammar||[]).length+" zasad")
    ));
    const br=h("div",{style:"display:flex;gap:8px;margin-top:12px"});
    br.appendChild(h("button",{class:"check-btn",style:"flex:2;margin:0",onclick:()=>saveMyLesson(uploadLang,prev)},"✓ Zapisz lekcję"));
    br.appendChild(h("button",{class:"next-btn",style:"margin:0;flex:1",onclick:()=>set({uploadStep:0,uploadFile:null,uploadPreview:null})},"← Wróć"));
    panel.appendChild(br);
  }
  return panel;
}

async function fetchYouTubeTranscript(videoId){
  // Próba 1: youtube-transcript3 API
  try{
    const res=await fetch(
      `https://youtube-transcript3.p.rapidapi.com/api/transcript?videoId=${videoId}&lang=en`,
      {headers:{"X-RapidAPI-Key":S.rapidKey,"X-RapidAPI-Host":"youtube-transcript3.p.rapidapi.com"}}
    );
    if(res.ok){
      const data=await res.json();
      if(data.transcript&&data.transcript.length>0){
        return data.transcript.map(t=>t.text).join("\n");
      }
    } else {
      const errBody=await res.text().catch(()=>"");
      console.log("Próba 1 failed: HTTP "+res.status+" — "+errBody);
    }
  } catch(e){console.log("Próba 1 failed:",e);}

  // Próba 2: youtube-transcriptor API
  try{
    const res=await fetch(
      `https://youtube-transcriptor.p.rapidapi.com/transcript?video_id=${videoId}&lang=en`,
      {headers:{"X-RapidAPI-Key":S.rapidKey,"X-RapidAPI-Host":"youtube-transcriptor.p.rapidapi.com"}}
    );
    if(res.ok){
      const data=await res.json();
      if(Array.isArray(data)&&data[0]?.transcriptionAsText){
        return data[0].transcriptionAsText;
      }
      if(data.transcription){
        return data.transcription.map(t=>t.subtitle).join("\n");
      }
    } else {
      const errBody=await res.text().catch(()=>"");
      console.log("Próba 2 failed: HTTP "+res.status+" — "+errBody);
      throw new Error("youtube-transcriptor zwróciło HTTP "+res.status+": "+errBody.slice(0,200));
    }
  } catch(e){
    if(e.message.startsWith("youtube-transcriptor")) throw e;
    console.log("Próba 2 failed:",e);
  }

  // All API attempts failed — explain options to user
  throw new Error("Żadne z API transkrypcji nie zadziałało (Twój klucz RapidAPI nie ma subskrypcji albo to wideo nie ma transkrypcji). Rozwiązania: (1) wklej transkrypcję ręcznie poniżej, (2) subskrybuj API na rapidapi.com (szukaj „youtube-transcript3\" lub „youtube-transcriptor\" — free tier 500/mies.)");
}

function isSrtFormat(text){
  if(!text) return false;
  return /\d+:\d+:\d+[.,]\d+\s*-->\s*\d+:\d+:\d+[.,]\d+/.test(text);
}

function parseSrt(text){
  if(!text) return null;
  const blocks = text.replace(/\r\n/g,"\n").split(/\n\s*\n/);
  const cues = [];
  for(const block of blocks){
    const lines = block.trim().split("\n").map(l=>l.trim()).filter(l=>l);
    if(lines.length < 2) continue;
    let tsIdx = -1;
    for(let i=0; i<lines.length; i++){ if(lines[i].includes("-->")){ tsIdx = i; break; } }
    if(tsIdx < 0) continue;
    const m = lines[tsIdx].match(/(\d+):(\d+):(\d+)[.,](\d+)\s*-->\s*(\d+):(\d+):(\d+)[.,](\d+)/);
    if(!m) continue;
    const start = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000;
    const end = parseInt(m[5])*3600 + parseInt(m[6])*60 + parseInt(m[7]) + parseInt(m[8])/1000;
    const textLines = lines.slice(tsIdx+1);
    const txt = textLines.join(" ").replace(/<[^>]+>/g,"").replace(/\{[^}]+\}/g,"").trim();
    if(txt) cues.push({start, end, text:txt});
  }
  return cues.length > 0 ? cues : null;
}

function formatTime(sec){
  if(!isFinite(sec)) return "0:00";
  const s = Math.floor(sec);
  const m = Math.floor(s/60);
  const r = s%60;
  return m+":"+(r<10?"0"+r:r);
}

async function fetchViaWorker(videoId){
  if(!S.workerUrl){ throw new Error("Worker nie skonfigurowany — wejdź w Ustawienia → 🎬 Worker do transkrypcji YouTube"); }
  const base = S.workerUrl.replace(/\/+$/, "");
  const langMap = {EN:"en", FR:"fr", IT:"it"};
  const lang = langMap[S.lang] || "en";
  const url = `${base}/?id=${encodeURIComponent(videoId)}&lang=${lang}`;
  const res = await fetch(url);
  if(!res.ok){
    const body = await res.json().catch(()=>({}));
    throw new Error(body.error || ("Worker HTTP "+res.status));
  }
  const data = await res.json();
  if(!data.cues || !Array.isArray(data.cues) || data.cues.length===0){
    throw new Error("Worker zwrócił pustą transkrypcję");
  }
  return data;
}

async function confirmDraftAndCreate(){
  const draft = (S.filmTranscriptDraft||"").trim();
  if(draft.length<30){set({filmTranscriptError:"Transkrypcja jest za krótka"});return;}
  if(!S.claudeKey){set({filmTranscriptError:"Wpisz klucz Claude (Anthropic) w Ustawieniach"});return;}
  const videoId = S.filmTranscriptDraftVideoId || S.filmYtId || null;
  set({filmTranscriptLoading:true,filmTranscriptError:""});
  try{
    let cues = null;
    if(isSrtFormat(draft)){
      cues = parseSrt(draft);
      console.log("[LinguaAgent] Draft SRT, "+(cues?cues.length:0)+" cues");
    }
    await processTranscriptToLesson(draft, videoId, cues);
    // On success processTranscriptToLesson sets lesson — clear draft
    set({filmTranscriptDraft:"", filmTranscriptDraftVideoId:null});
  }catch(e){
    console.error("[LinguaAgent] Generate from draft failed:", e);
    set({filmTranscriptLoading:false,filmTranscriptProcessing:false,filmTranscriptError:"Błąd: "+e.message});
  }
}

async function processManualPasteTranscript(){
  const text=(S.filmManualPaste||"").trim();
  if(text.length<30){set({filmTranscriptError:"Wklej dłuższą transkrypcję (min ~30 znaków)"});return;}

    filmTranscriptDraft: text,

    filmTranscriptError: ""
  });
}
