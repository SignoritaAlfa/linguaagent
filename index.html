// ── B1: SPACED REPETITION ──────────────────────────────────────────────────
const SRS_INTERVALS=[1,3,7,14,30];
function getSrsKey(word,lang){return (word||"").toLowerCase().trim()+"_"+lang;}
function updateSrs(word,lang,correct){
  const srs=Object.assign({},S.srs);
  const k=getSrsKey(word,lang);
  const entry=srs[k]||{level:0,next:new Date().toISOString().slice(0,10)};
  if(correct){entry.level=Math.min(entry.level+1,SRS_INTERVALS.length-1);}else{entry.level=0;}
  const days=SRS_INTERVALS[entry.level];
  const d=new Date();d.setDate(d.getDate()+days);
  entry.next=d.toISOString().slice(0,10);
  entry.word=word;entry.lang=lang;
  srs[k]=entry;
  localStorage.setItem("lingua_srs",JSON.stringify(srs));
  set({srs});
}
function getDueWords(lang){
  const today=new Date().toISOString().slice(0,10);
  return Object.values(S.srs).filter(e=>e.lang===lang&&e.next<=today);
}

// ── B4: QUIZ ────────────────────────────────────────────────────────────────
function startQuiz(lesson){
  if(!lesson.vocab||lesson.vocab.length<4){alert("Potrzeba minimum 4 słówek do quizu");return;}
  const cards=lesson.vocab.map((v,i)=>{
    const others=lesson.vocab.filter((_,j)=>j!==i);
    const shuffled=others.sort(()=>Math.random()-.5).slice(0,3);
    const dir=Math.random()>.5?"to_pl":"to_lang";
    const correct=dir==="to_pl"?v.tr:v.w;
    const question=dir==="to_pl"?v.w:v.tr;
    const options=[correct,...shuffled.map(s=>dir==="to_pl"?s.tr:s.w)].sort(()=>Math.random()-.5);
    return{question,correct,options,dir,word:v.w};
  }).sort(()=>Math.random()-.5);
  set({screen:"practice",lesson,mode:"quiz",cards,idx:0,score:{c:0,t:0},quizAnswer:null,quizSubmitted:false});
}

// ── B5: SENTENCE BUILDER ────────────────────────────────────────────────────
function startBuild(lesson){
  if(!lesson.dialog||lesson.dialog.length<3){alert("Za mało dialogu do układania zdań");return;}
  const cards=lesson.dialog.filter(d=>d.l.split(/\s+/).length>=4&&d.l.split(/\s+/).length<=15).slice(0,10).map(d=>{
    const words=d.l.replace(/[.,!?;:]/g,"").split(/\s+/).filter(Boolean);
    const shuffled=[...words].sort(()=>Math.random()-.5);
    return{original:d.l,words,shuffled,translation:d.t,speaker:d.s};
  });
  if(cards.length<2){alert("Za mało odpowiednich zdań do układania");return;}
  set({screen:"practice",lesson,mode:"build",cards,idx:0,score:{c:0,t:0},buildSelected:[],buildSubmitted:false});
}

// ── B5b: TŁUMACZ (PL → jezyk docelowy) ──────────────────────────────────────
let _translateRecognition = null;
function stopTranslateSpeech(){
  if(_translateRecognition){ try{_translateRecognition.stop();}catch(e){} _translateRecognition=null; }
  S.translateRecording=false;
}
function startTranslateSpeech(){
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Rec){ alert("Twoja przeglądarka nie obsługuje rozpoznawania mowy (Chrome/Edge tak)"); return; }
  stopTranslateSpeech();
  const r = new Rec();
  _translateRecognition = r;
  r.lang = "pl-PL";
  r.continuous = false;
  r.interimResults = true;
  S.translateRecording = true;
  render();
  let finalChunk = "";
  r.onresult = (e)=>{
    let interim = "";
    for(let i=e.resultIndex; i<e.results.length; i++){
      const txt = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalChunk += txt;
      else interim += txt;
    }
    const ta = document.getElementById("translate-input");
    if(ta){
      const base = S.translateInput || "";
      const sep = base && !base.endsWith(" ") ? " " : "";
      ta.value = base + sep + finalChunk + interim;
    }
  };
  r.onend = ()=>{
    const ta = document.getElementById("translate-input");
    const newVal = ta ? ta.value : ((S.translateInput||"")+" "+finalChunk).trim();
    _translateRecognition = null;
    set({translateRecording:false, translateInput:newVal});
  };
  r.onerror = (ev)=>{
    _translateRecognition = null;
    set({translateRecording:false, translateError:"Błąd mikrofonu: "+ev.error});
  };
  r.start();
}

async function doTranslate(){
  const text = (S.translateInput||"").trim();
  if(!text){ set({translateError:"Wpisz tekst do tłumaczenia"}); return; }
  if(!S.claudeKey){ set({translateError:"Wymagany klucz Claude (Anthropic) w Ustawieniach"}); return; }
  set({translateProcessing:true, translateError:"", translateResult:null});
  try{
    const lang = S.lang;
    const langName = {EN:"angielski",FR:"francuski",IT:"włoski"}[lang]||"obcy";
    const langAdj = {EN:"angielskim",FR:"francuskim",IT:"włoskim"}[lang]||"obcym";
    const prompt = `Przetłumacz poniższy polski tekst na ${langName} naturalnie, jak rodzimy użytkownik. Podaj też wymowę pełnego tłumaczenia (IPA i intuicyjną fonetykę po polsku) oraz wyciągnij kluczowe słowa i zwroty z tłumaczenia godne zapamiętania.\n\nTEKST PO POLSKU: "${text}"\n\nOdpowiedz TYLKO czystym JSON, bez markdown:\n{"translation":"tłumaczenie w ${langAdj}","ipa":"IPA pełnego tłumaczenia","pl":"jak czytać po polsku","alternatives":["alternatywne tłumaczenia (opcjonalnie 1-2)"],"words":[{"w":"słowo lub zwrot","tr":"po polsku","ipa":"IPA","pl":"czytaj","ex":"przykład użycia po ${langName}u","exT":"tłumaczenie przykładu"}]}\n\nwords: kluczowe słowa/zwroty z tłumaczenia (5-12 pozycji).`;
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"x-api-key":S.claudeKey,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:3000,messages:[{role:"user",content:[{type:"text",text:prompt}]}]})
    });
    if(!res.ok) throw new Error("API błąd "+res.status);
    const data = await res.json();
    const m = data.content[0].text.match(/\{[\s\S]*\}/);
    if(!m) throw new Error("Brak JSON w odpowiedzi");
    const parsed = JSON.parse(m[0]);
    set({translateProcessing:false, translateResult:parsed});
  }catch(e){
    set({translateProcessing:false, translateError:e.message});
  }
}

function addTranslateToLesson(target){
  const r = S.translateResult;
  if(!r) return;
  const lessons = S.myLessons[S.lang]||[];
  if(lessons.length===0){ alert("Nie masz własnych lekcji w tym języku. Wgraj/dodaj lekcję najpierw."); return; }
  let lessonId = S.translateAddTargetLesson;
  if(!lessonId || !lessons.find(l=>l.id===lessonId)) lessonId = lessons[0].id;
  const ml = Object.assign({}, S.myLessons);
  const lessonIdx = (ml[S.lang]||[]).findIndex(l=>l.id===lessonId);
  if(lessonIdx<0){ alert("Wybrana lekcja nie istnieje"); return; }
  const lesson = ml[S.lang][lessonIdx];
  if(target==="phrases"){
    if(!lesson.phrases) lesson.phrases=[];
    if(lesson.phrases.some(p=>p.w===r.translation)){ alert("Ten zwrot już jest w lekcji \""+lesson.title+"\""); return; }
    lesson.phrases.push({w:r.translation, tr:(S.translateInput||"").trim(), ipa:r.ipa||"", pl:r.pl||"", ex:"", exT:""});
    localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
    S.myLessons = ml; scheduleDriveSync();
    alert("✓ Dodano zdanie do Zwrotów lekcji \""+lesson.title+"\"");
    render();
  } else if(target==="vocab"){
    if(!lesson.vocab) lesson.vocab=[];
    let added=0;
    (r.words||[]).forEach(word=>{
      if(!lesson.vocab.some(v=>v.w===word.w)){
        lesson.vocab.push({w:word.w, tr:word.tr, ipa:word.ipa||"", pl:word.pl||"", ex:word.ex||r.translation||"", exT:word.exT||(S.translateInput||"").trim()});
        added++;
      }
    });
    localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
    S.myLessons = ml; scheduleDriveSync();
    alert("✓ Dodano "+added+" słówek do lekcji \""+lesson.title+"\"");
    render();
  }
}

      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px",onclick:()=>{ws[word+"_"+lang]="known";localStorage.setItem("lingua_word_status",JSON.stringify(ws));render();}},"Znam"));
      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px;color:var(--err-text);border-color:var(--err-text)",onclick:()=>{delete ws[word+"_"+lang];localStorage.setItem("lingua_word_status",JSON.stringify(ws));render();}},"Usuń"));
      row.appendChild(btns);list.appendChild(row);
    });
    main.appendChild(list);
  }
  if(known.length>0){
    main.appendChild(h("div",{class:"sec-label"},"Znam ("+known.length+")"));
    const list=h("div",{style:"margin-bottom:28px"});
    known.forEach(word=>{
      const row=h("div",{style:"display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"});
      row.appendChild(h("div",{style:"font-size:14px;color:var(--text)"},word));
      const btns=h("div",{style:"display:flex;gap:6px"});
      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px",onclick:()=>{ws[word+"_"+lang]="learning";localStorage.setItem("lingua_word_status",JSON.stringify(ws));render();}},"Ucz się"));
      row.appendChild(btns);list.appendChild(row);
    });
    main.appendChild(list);
  }
  if(learning.length===0&&known.length===0){
    main.appendChild(h("div",{class:"empty"},h("div",{class:"empty-icon"},"📝"),h("div",{class:"empty-text"},"Brak zapisanych słówek"),h("div",{class:"empty-sub"},"Kliknij słowo w dialogu lekcji aby je zapisać")));
  }
  w.appendChild(main);return w;
}

// ── B7: EKSPORT/IMPORT ─────────────────────────────────────────────────────
function exportAllData(){
  const data={myLessons:S.myLessons,lessonFolders:S.lessonFolders,myFilms:S.myFilms,wordStatus:JSON.parse(localStorage.getItem("lingua_word_status")||"{}"),srs:S.srs};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="lingua_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();
  URL.revokeObjectURL(url);
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.myLessons){const ml=Object.assign({},S.myLessons);Object.entries(data.myLessons).forEach(([lang,lessons])=>{if(!ml[lang])ml[lang]=[];ml[lang].push(...lessons);});localStorage.setItem("lingua_my_lessons",JSON.stringify(ml));S.myLessons=ml;}
      if(data.lessonFolders){const lf=Object.assign({},S.lessonFolders);Object.entries(data.lessonFolders).forEach(([lang,folders])=>{if(!lf[lang])lf[lang]=[];folders.forEach(f=>{if(!lf[lang].includes(f))lf[lang].push(f);});});localStorage.setItem("lingua_lesson_folders",JSON.stringify(lf));S.lessonFolders=lf;}
      if(data.myFilms){const mf=Object.assign({},S.myFilms);Object.entries(data.myFilms).forEach(([lang,films])=>{if(!mf[lang])mf[lang]=[];mf[lang].push(...films);});localStorage.setItem("lingua_my_films",JSON.stringify(mf));S.myFilms=mf;}
      if(data.wordStatus){const ws=JSON.parse(localStorage.getItem("lingua_word_status")||"{}");Object.assign(ws,data.wordStatus);localStorage.setItem("lingua_word_status",JSON.stringify(ws));}
      if(data.srs){const srs=Object.assign({},S.srs,data.srs);localStorage.setItem("lingua_srs",JSON.stringify(srs));S.srs=srs;}
      alert("Import zakończony! Zaimportowano dane.");render();
    }catch(e){alert("Błąd importu: "+e.message);}
  };
  r.readAsText(file);
}

// ── B8: DARK/LIGHT THEME ───────────────────────────────────────────────────
function applyTheme(theme){
  const r=document.documentElement;
  const paletteId = S.palette || "green";
  const palette = PALETTES[paletteId] || PALETTES.green;
  const accent = theme==="dark" ? palette.dark : palette.light;
  if(theme==="dark"){
    r.style.setProperty("--bg","#0e1117");r.style.setProperty("--bg2","#161b22");r.style.setProperty("--bg3","#1c2330");
    r.style.setProperty("--surface","#161b22");r.style.setProperty("--surface2","#1c2330");
    r.style.setProperty("--border","#2a3142");r.style.setProperty("--border2","#3a4254");
    r.style.setProperty("--text","#e8eaed");r.style.setProperty("--text2","#b0b7c2");r.style.setProperty("--text3","#7a8190");
    r.style.setProperty("--green-light","#7dc296");
    r.style.setProperty("--red","#e63946");r.style.setProperty("--red2","#ff5a68");r.style.setProperty("--red-dim","#3a1a1c");
    r.style.setProperty("--ok","#1a3522");r.style.setProperty("--ok-text","#7dc296");
    r.style.setProperty("--err","#3a1a1c");r.style.setProperty("--err-text","#ff8a92");
    document.body.style.background="#0e1117";document.documentElement.style.background="#0e1117";
  }else{
    r.style.setProperty("--bg","#ffffff");r.style.setProperty("--bg2","#f0f4f8");r.style.setProperty("--bg3","#e5ebf2");
    r.style.setProperty("--surface","#ffffff");r.style.setProperty("--surface2","#f7f9fc");
    r.style.setProperty("--border","#e4e7eb");r.style.setProperty("--border2","#d4d8df");
    r.style.setProperty("--text","#0e1117");r.style.setProperty("--text2","#3a3f4b");r.style.setProperty("--text3","#6b7280");
    r.style.setProperty("--green-light","#5aab76");
    r.style.setProperty("--red","#d62828");r.style.setProperty("--red2","#9d0208");r.style.setProperty("--red-dim","#fce4e4");
    r.style.setProperty("--ok","#e6f5ec");r.style.setProperty("--ok-text","#2a7a48");
    r.style.setProperty("--err","#fdeaea");r.style.setProperty("--err-text","#c53030");
    document.body.style.background="#ffffff";document.documentElement.style.background="#ffffff";
  }
  // Accent (paleta wybrana przez użytkownika)
  r.style.setProperty("--gold", accent.gold);
  r.style.setProperty("--gold2", accent.gold2);
  r.style.setProperty("--gold-dim", accent.goldDim);
  localStorage.setItem("lingua_theme",theme);S.theme=theme;
}

function applyPalette(paletteId){
  if(!PALETTES[paletteId]) return;
  S.palette = paletteId;
  localStorage.setItem("lingua_palette", paletteId);
  applyTheme(S.theme);
  scheduleDriveSync();
}
applyTheme(S.theme);

function render(){
  // Cleanup YouTube karaoke player if user navigated away from a film lesson dialog tab
  const stillKaraoke = S.screen==="lesson" && S.lessonTab==="dialog" && S.lesson && S.lesson.youtubeId && S.lesson.dialog && typeof (S.lesson.dialog[0]||{}).start === "number";
  if(!stillKaraoke && _ytPlayer) destroyYtPlayer();
  const root=document.getElementById("root");
  root.innerHTML="";
  const{screen}=S;
  if(screen==="home")root.appendChild(renderHome());
  else if(screen==="lang")root.appendChild(renderLang());
  else if(screen==="lesson")root.appendChild(renderLesson());
  else if(screen==="practice")root.appendChild(renderPractice());
  else if(screen==="results")root.appendChild(renderResults());
  else if(screen==="settings")root.appendChild(renderSettings());
  else if(screen==="audiomgr")root.appendChild(renderAudioMgr());
  else if(screen==="filmoteka")root.appendChild(renderFilmoteka());
  else if(screen==="mywords")root.appendChild(renderMyWords());
  else if(screen==="translate")root.appendChild(renderTranslate());
}

window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(render,50);
setTimeout(()=>driveSilentReconnect(0),800);

</script>
