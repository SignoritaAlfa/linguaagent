    if(isLangToPl && v.pl){ const d=document.createElement("div"); d.className="vocab-list-phonetic"; d.textContent="czytaj: "+v.pl; left.appendChild(d); }
    row.appendChild(left);

    const right = document.createElement("div");
    const trDiv = document.createElement("div"); trDiv.className="vocab-list-translation"; trDiv.textContent=isLangToPl?v.tr:v.w;
    right.appendChild(trDiv);
    // All examples: primary + extras
    const allExamples = [];
    if(v.ex || v.exT) allExamples.push({ex:v.ex||"", exT:v.exT||""});
    (v.extraExamples||[]).forEach(e=>allExamples.push({ex:e.ex||"", exT:e.exT||""}));
    allExamples.forEach((exObj, exIdx)=>{
      if(!exObj.ex && !exObj.exT) return;
      const foreignExBox=document.createElement("div");
      foreignExBox.style.cssText="display:flex;align-items:flex-start;gap:6px;margin-top:6px";
      const exSpk=document.createElement("button");
      exSpk.textContent="♪";
      exSpk.title="Posłuchaj przykładu";
      exSpk.style.cssText="width:20px;height:20px;flex-shrink:0;padding:0;line-height:1;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-size:10px";
      exSpk.onmouseover=()=>{exSpk.style.borderColor="var(--gold)";exSpk.style.color="var(--gold)";};
      exSpk.onmouseout=()=>{exSpk.style.borderColor="var(--border)";exSpk.style.color="var(--text3)";};
      exSpk.onclick=(e)=>{e.stopPropagation();speak(exObj.ex,lang,"");};
      const exTxt=document.createElement("div");
      exTxt.className="vocab-list-example";
      exTxt.style.flex="1";
      exTxt.textContent=exObj.ex;
      foreignExBox.appendChild(exSpk);
      foreignExBox.appendChild(exTxt);
      let plExBox=null;
      if(exObj.exT){
        plExBox=document.createElement("div");
        plExBox.style.cssText="font-size:12px;color:var(--text3);font-style:italic;margin-top:6px;line-height:1.5";
        plExBox.textContent=exObj.exT;
      }
      if(isLangToPl){
        left.appendChild(foreignExBox);
        if(plExBox) right.appendChild(plExBox);
      } else {
        if(plExBox) left.appendChild(plExBox);
        right.appendChild(foreignExBox);
      }
    });
    row.appendChild(right);

    // Przycisk "Uczę się" — dodaje do "Moje słówka" lub "Moje zwroty" (zależnie od listy)
    {
      const isPhraseBtn = listType === "phrases";
      const storageKey = isPhraseBtn ? "lingua_phrase_status" : "lingua_word_status";
      const targetLabel = isPhraseBtn ? "Moje zwroty" : "Moje słówka";
      const liveStatus = JSON.parse(localStorage.getItem(storageKey)||"{}");
      const wsKey = (v.w||"").toLowerCase() + "_" + lang;
      const isLearning = liveStatus[wsKey] === "learning";
      const isKnown = liveStatus[wsKey] === "known";
      const learnBtn = document.createElement("button");
      learnBtn.textContent = isLearning ? "📖✓" : (isKnown ? "✓" : "📖");
      learnBtn.title = isLearning ? ("Usuń z "+targetLabel) : (isKnown ? "Oznaczone jako znane — kliknij by uczyć" : ("Dodaj do "+targetLabel));
      const baseStyle = "border:1px solid var(--border);border-radius:4px;width:34px;height:28px;cursor:pointer;font-size:12px;line-height:1;padding:0;align-self:start;font-family:inherit";
      const activeStyle = baseStyle + ";background:var(--gold-dim);border-color:var(--gold);color:var(--gold)";
      learnBtn.style.cssText = isLearning ? activeStyle : (baseStyle + ";background:none;color:var(--text3)");
      learnBtn.onclick = (e)=>{
        e.stopPropagation();
        const ws = JSON.parse(localStorage.getItem(storageKey)||"{}");
        if(ws[wsKey] === "learning"){
          delete ws[wsKey];
          learnBtn.textContent = "📖";
          learnBtn.title = "Dodaj do "+targetLabel;
          learnBtn.style.cssText = baseStyle + ";background:none;color:var(--text3)";
        } else {
          ws[wsKey] = "learning";
          learnBtn.textContent = "📖✓";
          learnBtn.title = "Usuń z "+targetLabel;
          learnBtn.style.cssText = activeStyle;
        }
        localStorage.setItem(storageKey, JSON.stringify(ws));
        scheduleDriveSync();
      };
      row.appendChild(learnBtn);
    }

    if(onMove){
      const moveBtn = document.createElement("button");
      const isPhraseList = listType==="phrases";
      moveBtn.textContent = isPhraseList ? "→ Sł" : "→ Zw";
      moveBtn.title = isPhraseList ? "Przenieś do Słówek" : "Przenieś do Zwrotów";
      moveBtn.style.cssText = "background:none;border:1px solid var(--border);color:var(--text3);border-radius:4px;height:28px;padding:0 8px;cursor:pointer;font-size:11px;line-height:1;align-self:start;white-space:nowrap;font-family:inherit";
      moveBtn.onmouseover = ()=>{ moveBtn.style.borderColor="var(--gold)"; moveBtn.style.color="var(--gold)"; };
      moveBtn.onmouseout = ()=>{ moveBtn.style.borderColor="var(--border)"; moveBtn.style.color="var(--text3)"; };
      moveBtn.onclick = (e)=>{ e.stopPropagation(); onMove(i); };
      row.appendChild(moveBtn);
    }
    if(onEdit){
      const editBtn = document.createElement("button");
      editBtn.textContent = "✏";
      editBtn.title = "Edytuj pozycję";
      editBtn.style.cssText = "background:none;border:1px solid var(--border);color:var(--text3);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:12px;line-height:1;padding:0;align-self:start";
      editBtn.onmouseover = ()=>{ editBtn.style.borderColor="var(--gold)"; editBtn.style.color="var(--gold)"; };
      editBtn.onmouseout = ()=>{ editBtn.style.borderColor="var(--border)"; editBtn.style.color="var(--text3)"; };
      editBtn.onclick = (e)=>{ e.stopPropagation(); onEdit(i); };
      row.appendChild(editBtn);
    }

    if(onDelete){
      const delBtn = document.createElement("button");
      delBtn.textContent = "✕";
      delBtn.title = "Usuń tę pozycję";
      delBtn.style.cssText = "background:none;border:1px solid var(--border);color:var(--text3);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:12px;line-height:1;padding:0;align-self:start";
      delBtn.onmouseover = ()=>{ delBtn.style.borderColor="var(--red)"; delBtn.style.color="var(--red)"; };
      delBtn.onmouseout = ()=>{ delBtn.style.borderColor="var(--border)"; delBtn.style.color="var(--text3)"; };
      delBtn.onclick = (e)=>{ e.stopPropagation(); if(confirm("Usunąć \""+v.w+"\"?")) onDelete(i); };
      row.appendChild(delBtn);
    }

    wrap.appendChild(row);
  });
  return wrap;
}

function openEditEntryForm(lesson, arrayKey, lang, idx){
  document.querySelectorAll('.entry-edit-overlay').forEach(el=>el.remove());
  const item = (lesson[arrayKey]||[])[idx];
  if(!item) return;
  const label = arrayKey==="phrases" ? "zwrot" : "słówko";
  const langName = lang==="EN" ? "angielskim" : lang==="FR" ? "francuskim" : lang==="IT" ? "włoskim" : "obcym";

  const overlay = document.createElement("div");
  overlay.className = "entry-edit-overlay";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto";

  const modal = document.createElement("div");
  modal.style.cssText = "background:var(--surface);border-radius:10px;padding:24px;max-width:640px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.3);font-family:inherit";
  overlay.appendChild(modal);

  // Header
  const head = document.createElement("div");
  head.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:18px";
  const title = document.createElement("div");
  title.style.cssText = "font-size:16px;font-weight:500;color:var(--text)";
  title.textContent = "Edytuj " + label;
  head.appendChild(title);
  const closeBtn = document.createElement("button");
  closeBtn.style.cssText = "background:none;border:none;cursor:pointer;font-size:22px;color:var(--text3);line-height:1;padding:0 4px";
  closeBtn.textContent = "✕";
  closeBtn.onclick = ()=>overlay.remove();
  head.appendChild(closeBtn);
  modal.appendChild(head);

  function mkInp(ph, val, marginBottom){
    const inp = document.createElement("input");
    inp.type = "text";
    inp.placeholder = ph;
    inp.className = "key-inp";
    inp.style.marginBottom = marginBottom;
    inp.value = val || "";
    return inp;
  }
  const wInp  = mkInp(arrayKey==="phrases"?"Zwrot (obcojęzyczne)":"Słowo (obcojęzyczne)", item.w, "8px");
  const trInp = mkInp("Tłumaczenie po polsku", item.tr, "8px");
  const ipaInp = mkInp("Wymowa IPA (opcjonalnie)", item.ipa, "8px");
  const plInp = mkInp("Jak czytać po polsku (opcjonalnie)", item.pl, "8px");
  modal.appendChild(wInp);
  modal.appendChild(trInp);
  modal.appendChild(ipaInp);
  modal.appendChild(plInp);

  // Examples section
  const exHead = document.createElement("div");
  exHead.style.cssText = "font-size:11px;color:var(--text3);margin:14px 0 8px 0;letter-spacing:.06em;text-transform:uppercase";
  exHead.textContent = "Przykłady użycia";
  modal.appendChild(exHead);

  const examples = [];
  if(item.ex || item.exT) examples.push({ex:item.ex||"", exT:item.exT||""});
  (item.extraExamples||[]).forEach(e=>examples.push({ex:e.ex||"", exT:e.exT||""}));
  if(examples.length === 0) examples.push({ex:"", exT:""});

  const exContainer = document.createElement("div");
  function rebuildExamples(){
    exContainer.innerHTML = "";
    examples.forEach((exObj, exIdx)=>{
      const exRow = document.createElement("div");
      exRow.style.cssText = "display:grid;grid-template-columns:1fr 1fr 28px;gap:8px;margin-bottom:8px;align-items:start";
      const exIn = document.createElement("input");
      exIn.type = "text"; exIn.className = "key-inp"; exIn.placeholder = "Przykład w "+langName;
      exIn.value = exObj.ex || "";
      exIn.oninput = ()=>{ examples[exIdx].ex = exIn.value; };
      const exTIn = document.createElement("input");
      exTIn.type = "text"; exTIn.className = "key-inp"; exTIn.placeholder = "Tłumaczenie po polsku";
      exTIn.value = exObj.exT || "";
      exTIn.oninput = ()=>{ examples[exIdx].exT = exTIn.value; };
      const rmBtn = document.createElement("button");
      rmBtn.className = "sbtn";
      rmBtn.style.cssText = "width:28px;padding:0;font-size:14px;border-color:var(--red);color:var(--red);align-self:start";
      rmBtn.textContent = "✕";
      rmBtn.title = "Usuń ten przykład";
      rmBtn.onclick = ()=>{
        examples.splice(exIdx, 1);
        if(examples.length===0) examples.push({ex:"",exT:""});
        rebuildExamples();
      };
      exRow.appendChild(exIn);
      exRow.appendChild(exTIn);
      exRow.appendChild(rmBtn);
      exContainer.appendChild(exRow);
    });
  }
  rebuildExamples();
  modal.appendChild(exContainer);

  const addExBtn = document.createElement("button");
  addExBtn.className = "sbtn";
  addExBtn.style.cssText = "font-size:11px;border-color:var(--gold);color:var(--gold);margin-bottom:18px";
  addExBtn.textContent = "+ Dodaj kolejny przykład";
  addExBtn.onclick = ()=>{ examples.push({ex:"",exT:""}); rebuildExamples(); };
  modal.appendChild(addExBtn);

  // Buttons
  const btnRow = document.createElement("div");
  btnRow.style.cssText = "display:flex;gap:10px;margin-top:8px";
  const saveBtn = document.createElement("button");
  saveBtn.className = "primary";
  saveBtn.textContent = "💾 Zapisz zmiany";
  saveBtn.onclick = ()=>{
    const w = wInp.value.trim();
    const tr = trInp.value.trim();
    if(!w || !tr){ alert("Słowo/zwrot i tłumaczenie są wymagane"); return; }
    const cleanExamples = examples.filter(e=>(e.ex||"").trim() || (e.exT||"").trim()).map(e=>({ex:(e.ex||"").trim(), exT:(e.exT||"").trim()}));
    const newItem = { w, tr, ipa: ipaInp.value.trim(), pl: plInp.value.trim() };
    if(cleanExamples.length > 0){
      newItem.ex = cleanExamples[0].ex;
      newItem.exT = cleanExamples[0].exT;
      if(cleanExamples.length > 1) newItem.extraExamples = cleanExamples.slice(1);
    } else {
      newItem.ex = ""; newItem.exT = "";
    }
    lesson[arrayKey][idx] = newItem;
    const ml = Object.assign({}, S.myLessons);
    const li = (ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
    if(li>=0){
      ml[S.lang][li][arrayKey] = lesson[arrayKey];
      localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
      scheduleDriveSync();
      set({myLessons: ml});
    }
    overlay.remove();
  };
  const cancelBtn = document.createElement("button");
  cancelBtn.className = "sbtn";
  cancelBtn.textContent = "Anuluj";
  cancelBtn.onclick = ()=>overlay.remove();
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(cancelBtn);
  modal.appendChild(btnRow);

  // Close on backdrop click (but not modal click)
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  document.body.appendChild(overlay);
  setTimeout(()=>wInp.focus(), 50);
}

  formBox.appendChild(exInp);
  formBox.appendChild(exTInp);
  const btnRow = h("div",{style:"display:flex;gap:10px;align-items:center;flex-wrap:wrap"});
  const clearForm = ()=>{ [wInp,trInp,ipaInp,plInp,exInp,exTInp].forEach(i=>i.value=""); };
  const closeForm = ()=>{ formBox.style.display="none"; toggleBtn.textContent="+ Dodaj "+label+" ręcznie"; };

  async function aiFillPronunciation(word){
    if(!S.claudeKey && !S.geminiKey) return null;
    const langName = {EN:"angielskim",FR:"francuskim",IT:"włoskim",DE:"niemieckim",ES:"hiszpańskim"}[lang]||lang;
    const promptText = `Podaj wymowę dla ${arrayKey==="phrases"?"zwrotu":"słowa"} "${word}" w języku ${langName}. Pole "ipa" to standard międzynarodowy fonetyczny, pole "pl" to fonetyka czytana intuicyjnie po polsku (np. dla angielskiego "hello" → "helou"). Odpowiedz TYLKO czystym JSON, bez markdown, bez komentarzy: {"ipa":"/.../","pl":"jak czytać po polsku"}`;
    try{
      const rawText = await callLessonModel(promptText);
      const m = rawText.match(/\{[\s\S]*\}/);
      if(!m) return null;
      const parsed = JSON.parse(m[0]);
      return {ipa: parsed.ipa||"", pl: parsed.pl||""};
    }catch(e){ console.error("[Lingua] AI fill failed:",e); return null; }
  }

  const aiBtn = h("button",{class:"sbtn",style:"border-color:var(--gold);color:var(--gold)"},"✨ Uzupełnij wymowę z AI");
  aiBtn.onclick = async ()=>{
    const w=(wInp.value||"").trim();
    if(!w){ alert("Najpierw wpisz "+(arrayKey==="phrases"?"zwrot":"słowo")); wInp.focus(); return; }
    if(!S.claudeKey && !S.geminiKey){ alert("Wymagany klucz Claude lub Gemini w Ustawieniach"); return; }
    aiBtn.disabled=true; aiBtn.textContent="⏳ Generuję...";
    const r = await aiFillPronunciation(w);
    if(r){
      if(r.ipa) ipaInp.value = r.ipa;
      if(r.pl) plInp.value = r.pl;
      aiBtn.textContent = "✓ Uzupełnione"; aiBtn.style.color="var(--ok-text)"; aiBtn.style.borderColor="var(--ok-text)";
      setTimeout(()=>{ aiBtn.textContent="✨ Uzupełnij wymowę z AI"; aiBtn.style.color="var(--gold)"; aiBtn.style.borderColor="var(--gold)"; aiBtn.disabled=false; },1500);
    } else {
      aiBtn.textContent="⚠ Błąd — spróbuj ponownie"; aiBtn.style.color="var(--err-text)"; aiBtn.style.borderColor="var(--err-text)";
      setTimeout(()=>{ aiBtn.textContent="✨ Uzupełnij wymowę z AI"; aiBtn.style.color="var(--gold)"; aiBtn.style.borderColor="var(--gold)"; aiBtn.disabled=false; },2000);
    }
  };

  const saveBtn = h("button",{class:"primary"},"💾 Zapisz i dodaj kolejny");
  saveBtn.onclick = async ()=>{
    const w=(wInp.value||"").trim(), tr=(trInp.value||"").trim();
    if(!w||!tr){ alert("Wpisz minimum "+(arrayKey==="phrases"?"zwrot i jego tłumaczenie":"słowo i jego tłumaczenie")); return; }
    if(!lesson[arrayKey]) lesson[arrayKey]=[];
    if(lesson[arrayKey].some(v=>v.w===w)){ if(!confirm("\""+w+"\" już istnieje w tej lekcji. Dodać duplikat?")) return; }
    let ipa=(ipaInp.value||"").trim(), pl=(plInp.value||"").trim();
    if((!ipa || !pl) && (S.claudeKey || S.geminiKey)){
      saveBtn.disabled=true; saveBtn.textContent="⏳ Uzupełniam wymowę...";
      const r = await aiFillPronunciation(w);
      if(r){ if(!ipa && r.ipa) ipa=r.ipa; if(!pl && r.pl) pl=r.pl; }
      saveBtn.disabled=false; saveBtn.textContent="💾 Zapisz i dodaj kolejny";
    }
    lesson[arrayKey].push({w,tr,ipa,pl,ex:(exInp.value||"").trim(),exT:(exTInp.value||"").trim()});
    const ml=Object.assign({},S.myLessons);
    const li=(ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
    if(li>=0){ ml[S.lang][li][arrayKey]=lesson[arrayKey]; set({myLessons:ml}); localStorage.setItem("lingua_my_lessons",JSON.stringify(ml)); scheduleDriveSync(); }
    clearForm();
    setTimeout(()=>wInp.focus(),50);
  };
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(aiBtn);
  btnRow.appendChild(h("button",{class:"sbtn",onclick:closeForm},"Zamknij"));
  formBox.appendChild(btnRow);
  toggleBtn.onclick = ()=>{
    if(formBox.style.display==="none"){
      formBox.style.display="block";
      toggleBtn.textContent="✕ Zamknij formularz";
      setTimeout(()=>wInp.focus(),50);
    } else closeForm();
  };
  wrap.appendChild(toggleBtn);
  wrap.appendChild(formBox);
  return wrap;
}

function renderUploadPanel(){
  const{uploadStep,uploadFile,uploadPreview,uploadProcessing,uploadError,uploadLang,claudeKey}=S;
  const panel=h("div",{class:"upload-panel"});
  const ph=h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"});
  ph.appendChild(h("div",{},
    h("div",{class:"upload-title"},"Wgraj własną lekcję"),
    h("div",{class:"upload-sub"},"Zdjęcie, PDF, plik .md/.txt lub tekst — Claude przeanalizuje i stworzy lekcję")
  ));
  ph.appendChild(h("button",{style:"background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3)",onclick:()=>set({showUpload:false})},"✕"));
  panel.appendChild(ph);

  if(!claudeKey){
    panel.appendChild(h("div",{class:"msg-err",style:"margin-bottom:0"},"⚠️ Potrzebujesz klucza Anthropic API — wejdź w Ustawienia lektora."));
    return panel;
  }

  if(uploadStep===0){
    const ug=h("div",{class:"upload-grid"});
    // Opcja 1: Zdjęcie / Skan
    const imgL=h("label",{class:"upload-opt"});
    imgL.appendChild(h("div",{class:"uicon"},"📸"));
    imgL.appendChild(h("div",{class:"ulabel"},"Zdjęcie / Skan"));
    imgL.appendChild(h("div",{class:"udesc"},"JPG, PNG"));
    const ii=h("input",{type:"file",accept:"image/*",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    imgL.appendChild(ii);
    ug.appendChild(imgL);
    // Opcja 2: PDF
    const pdfL=h("label",{class:"upload-opt"});
    pdfL.appendChild(h("div",{class:"uicon"},"📄"));
    pdfL.appendChild(h("div",{class:"ulabel"},"Plik PDF"));
    pdfL.appendChild(h("div",{class:"udesc"},"PDF"));
    const pi=h("input",{type:"file",accept:".pdf",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    pdfL.appendChild(pi);
    ug.appendChild(pdfL);
    // Opcja 3: Plik .md / .txt
    const mdL=h("label",{class:"upload-opt"});
    mdL.appendChild(h("div",{class:"uicon"},"📝"));
    mdL.appendChild(h("div",{class:"ulabel"},"Plik tekstowy"));
    mdL.appendChild(h("div",{class:"udesc"},"MD, TXT, Markdown"));
    const mi=h("input",{type:"file",accept:".md,.markdown,.txt,text/plain,text/markdown",style:"display:none",onchange:(e)=>{if(e.target.files[0])set({uploadFile:e.target.files[0],uploadStep:1});}});
    mdL.appendChild(mi);
    ug.appendChild(mdL);
    // Opcja 4: Własny tekst / notatki
    const txtOpt=h("div",{class:"upload-opt",style:"cursor:pointer",onclick:()=>set({uploadStep:"text"})});
    txtOpt.appendChild(h("div",{class:"uicon"},"✏️"));
    txtOpt.appendChild(h("div",{class:"ulabel"},"Własny tekst"));
    txtOpt.appendChild(h("div",{class:"udesc"},"Wpisz lub wklej notatki"));
    ug.appendChild(txtOpt);
    panel.appendChild(ug);
  }

  // Krok "text" — pełny edytor tekstu
  if(uploadStep==="text"){
    panel.appendChild(h("button",{class:"back-btn",style:"margin-bottom:12px",onclick:()=>set({uploadStep:0,uploadPreview:null})},"← Wróć do wyboru"));
    panel.appendChild(h("div",{style:"font-size:14px;color:var(--text);font-weight:500;margin-bottom:6px"},"✏️ Wpisz lub wklej swój tekst"));
    panel.appendChild(h("div",{style:"font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6"},"Wpisz notatki, dialog, słówka, zdania — AI stworzy z nich kompletną lekcję ze słownikiem, fiszkami, ćwiczeniami, gramatyką i czytaniem."));
    const ta=h("textarea",{style:"width:100%;min-height:220px;padding:16px;border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;color:var(--text);line-height:1.7;border-radius:2px",
      placeholder:"Wpisz tutaj swoje notatki, tekst z lekcji, dialog, listę słówek...\n\nPrzykład:\nBonjour, comment allez-vous?\nJe suis très content de vous voir.\nOù est la bibliothèque?",
      oninput:(e)=>set({uploadPreview:e.target.value})});
    if(S.uploadPreview&&typeof S.uploadPreview==="string") ta.value=S.uploadPreview;
    panel.appendChild(ta);
    const charCount=S.uploadPreview&&typeof S.uploadPreview==="string"?S.uploadPreview.length:0;
    panel.appendChild(h("div",{style:"font-size:11px;color:var(--text3);margin-top:6px;text-align:right"},charCount+" znaków"+(charCount<20?" · minimum 20 znaków":"")));
    if(charCount>=20){
      panel.appendChild(h("button",{class:"check-btn",style:"margin-top:14px;width:100%;padding:14px;font-size:14px",onclick:()=>{set({uploadStep:1,uploadFile:null});processUpload();}},"✨ Stwórz lekcję z tego tekstu"));
    }
  }

  if(uploadStep===1&&uploadFile){
    panel.appendChild(h("div",{class:"msg-ok"},"✓ "+uploadFile.name+" ("+Math.round(uploadFile.size/1024)+" KB)"));
    if(!uploadProcessing){
      panel.appendChild(h("button",{class:"check-btn",onclick:processUpload},"Analizuj z Claude"));
    } else {
      panel.appendChild(h("div",{style:"padding:20px;text-align:center;color:var(--ink3);font-size:13px"},"⏳ Trwa analiza tekstu..."));
    }
  }

  if(uploadStep===1&&!uploadFile){
    if(uploadProcessing){
      panel.appendChild(h("div",{style:"padding:28px;text-align:center;color:var(--text2);font-size:13px"},
        h("div",{style:"font-size:28px;margin-bottom:8px"},"✨"),
        h("div",{},"Tworzę lekcję z Twojego tekstu..."),
        h("div",{style:"font-size:11px;color:var(--text3);margin-top:6px"},"słownik, fiszki, ćwiczenia, gramatyka — to potrwa kilka sekund")
      ));
    }
  }

  if(uploadError) panel.appendChild(h("div",{class:"msg-err"},uploadError));

  if(uploadStep===2&&uploadPreview&&typeof uploadPreview==="object"){
    const prev=uploadPreview;
    panel.appendChild(h("div",{class:"msg-ok"},
      h("div",{style:"font-weight:500;margin-bottom:4px"},prev.title||"Bez tytułu"),
      h("div",{style:"font-size:12px"},
        (prev.level||"")+" · "+(prev.dialog||[]).length+" linii · "+(prev.vocab||[]).length+" słówek · "+(prev.grammar||[]).length+" zasad")
    ));
    const br=h("div",{style:"display:flex;gap:8px;margin-top:12px"});
    br.appendChild(h("button",{class:"check-btn",style:"flex:2;margin:0",onclick:()=>saveMyLesson(uploadLang,prev)},"✓ Zapisz lekcję"));
    br.appendChild(h("button",{class:"next-btn",style:"margin:0;flex:1",onclick:()=>set({uploadStep:0,uploadFile:null,uploadPreview:null})},"← Wróć"));
    panel.appendChild(br);
  }
  return panel;
}

          const prompt=type==="vocab"
            ? `Z poniższego tekstu wyciągnij MAKSYMALNIE DUŻO słów wartych nauki — celuj w 60-100 pozycji, absolutne minimum 50. NIE PRZESTAWAJ na 30 ani 40 — kontynuuj aż wyczerpiesz wszystkie wartościowe słowa z tekstu. Wybierz słowa kluczowe, idiomy, kolokwializmy, trudniejsze słowa, słowa specyficzne dla kontekstu, a także słówka B1-C1.\n\nKRYTYCZNE ZASADY FORMATU "w":\n- Dla rzeczowników w językach z rodzajem (FR: le/la/l'/un/une; IT: il/la/lo/l'/un/una/uno; DE: der/die/das; NO: en/ei/et — bokmål) ZAWSZE z rodzajnikiem (np. "le chien", "la maison", "il cane", "en bil").\n- Dla czasowników: BEZOKOLICZNIK (FR: parler; IT: parlare; EN: to talk; NO: å snakke). NIE odmieniona forma z tekstu.\n\nDla każdego podaj tłumaczenie PL, wymowę IPA i przykład z tekstu. Odpowiedz TYLKO czystym JSON: {"items":[{"w":"słowo","tr":"tłumaczenie PL","ipa":"IPA","pl":"fonetyka","ex":"przykład","exT":"tłumaczenie przykładu"}]}\n\nTEKST:\n${currentText.slice(0,30000)}`
            : `Z poniższego tekstu wyciągnij MAKSYMALNIE DUŻO użytecznych zwrotów, wyrażeń i kolokacji — celuj w 50-80 pozycji, absolutne minimum 40. NIE PRZESTAWAJ na 20 ani 30 — kontynuuj aż wyczerpiesz wszystkie wartościowe zwroty z tekstu. Szukaj: idiomów, wyrażeń potocznych, zwrotów konwersacyjnych, czasowników frazowych, przyimkowych konstrukcji, kolokacji rzeczownik+czasownik, utartych zwrotów. Odpowiedz TYLKO czystym JSON: {"items":[{"w":"zwrot","tr":"tłumaczenie PL","ipa":"IPA","pl":"fonetyka","ex":"przykład użycia","exT":"tłumaczenie"}]}\n\nTEKST:\n${currentText.slice(0,30000)}`;
          const rawText = await callLessonModel(prompt);
          const parsed=tolerantParseJson(rawText);
          const items=parsed.items||[];
          if(!items.length) throw new Error("Brak wyników");
          // Show results with checkboxes + per-item + and bulk-add buttons
          const resultDiv=document.getElementById(`gen-result-${type}`);
          resultDiv.innerHTML="";
          resultDiv.style.display="block";
          const headerRow=document.createElement("div");
          headerRow.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px";
          const header=document.createElement("div");
          header.style.cssText="font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase";
          header.textContent=(type==="vocab"?"Słówka":"Zwroty")+" z tekstu ("+items.length+")";
          headerRow.appendChild(header);
          const toggleAllBtn=document.createElement("button");
          toggleAllBtn.style.cssText="background:none;border:1px solid var(--border);color:var(--text2);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit";
          toggleAllBtn.textContent="☑ Zaznacz wszystkie";
          headerRow.appendChild(toggleAllBtn);
          resultDiv.appendChild(headerRow);

          const selectedIndexes=new Set();
          const addedIndexes=new Set();
          const itemRefs=[];
          let bulkBtn=null;
          const updateBulkBtn=()=>{
            if(!bulkBtn) return;
            const c=selectedIndexes.size;
            if(c===0){
              bulkBtn.disabled=true;
              bulkBtn.style.opacity="0.45";
              bulkBtn.style.cursor="default";
              bulkBtn.textContent="Zaznacz pozycje wyżej i dodaj kilka naraz";
            } else {
              bulkBtn.disabled=false;
              bulkBtn.style.opacity="1";
              bulkBtn.style.cursor="pointer";
              bulkBtn.textContent="+ Dodaj zaznaczone ("+c+") do "+(type==="phrases"?"zwrotów":"fiszek");
            }
            const selectable=items.length-addedIndexes.size;
            toggleAllBtn.textContent=(c===selectable && selectable>0) ? "☐ Odznacz wszystkie" : "☑ Zaznacz wszystkie";
          };

          items.forEach((item,i)=>{
            const row=document.createElement("div");
            row.style.cssText="display:grid;grid-template-columns:24px 1fr 1fr 36px;gap:8px 16px;padding:10px 0;border-bottom:1px solid var(--border);align-items:start";
            const cbCol=document.createElement("div");
            cbCol.style.cssText="display:flex;align-items:center;padding-top:4px";
            const checkbox=document.createElement("input");
            checkbox.type="checkbox";
            checkbox.style.cssText="cursor:pointer;width:18px;height:18px;accent-color:var(--gold)";
            checkbox.onchange=(e)=>{
              if(e.target.checked) selectedIndexes.add(i);
              else selectedIndexes.delete(i);
              updateBulkBtn();
            };
            cbCol.appendChild(checkbox);
            const left=document.createElement("div");
            left.innerHTML=`<div style="font-weight:500;color:var(--text);font-size:14px">${item.w}</div><div style="font-family:monospace;font-size:11px;color:var(--text3)">${item.ipa||""}</div><div style="font-size:11px;color:var(--text3)">${item.pl||""}</div>`;
            const right=document.createElement("div");
            right.innerHTML=`<div style="color:var(--gold);font-size:13px">${item.tr}</div><div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:2px">${item.ex||""}</div>`;
            const addBtn=document.createElement("button");
            addBtn.textContent="+";
            addBtn.title = type==="phrases" ? "Dodaj do zwrotów lekcji" : "Dodaj do fiszek lekcji";
            addBtn.style.cssText="background:none;border:1px solid var(--gold);color:var(--gold);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1;padding:0";
            addBtn.onclick=()=>{
              const arr = type==="phrases" ? "phrases" : "vocab";
              if(!lesson[arr]) lesson[arr]=[];
              const exists=lesson[arr].some(v=>v.w===item.w);
              if(!exists){
                lesson[arr].push({w:item.w,tr:item.tr,ipa:item.ipa||"" ,pl:item.pl||"" ,ex:item.ex||"" ,exT:item.exT||""});
                const ml=Object.assign({},S.myLessons);
                const li=(ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
                if(li>=0){ml[S.lang][li][arr]=lesson[arr];S.myLessons=ml;localStorage.setItem("lingua_my_lessons",JSON.stringify(ml));scheduleDriveSync();}
              }
              addBtn.textContent="✓";addBtn.style.color="var(--ok-text)";addBtn.disabled=true;
              checkbox.checked=false; checkbox.disabled=true;
              selectedIndexes.delete(i); addedIndexes.add(i);
              updateBulkBtn();
            };
            itemRefs.push({checkbox, addBtn});
            row.appendChild(cbCol); row.appendChild(left); row.appendChild(right); row.appendChild(addBtn);
            resultDiv.appendChild(row);
          });

          toggleAllBtn.onclick=()=>{
            const selectable=items.length-addedIndexes.size;
            const allSelected=selectedIndexes.size===selectable && selectable>0;
            if(allSelected){
              selectedIndexes.clear();
              itemRefs.forEach(ref=>{ if(!ref.checkbox.disabled) ref.checkbox.checked=false; });
            } else {
              itemRefs.forEach((ref,i)=>{
                if(!ref.checkbox.disabled){ ref.checkbox.checked=true; selectedIndexes.add(i); }
              });
            }
            updateBulkBtn();
          };

          const btnRow=document.createElement("div");
          btnRow.style.cssText="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap";
          bulkBtn=document.createElement("button");
          bulkBtn.style.cssText="flex:2;min-width:240px;padding:10px 20px;background:var(--gold);color:#fff;cursor:default;font-size:12px;font-family:inherit;letter-spacing:.04em;border:1px solid var(--gold);opacity:0.45;border-radius:4px";
          bulkBtn.disabled=true;
          bulkBtn.textContent="Zaznacz pozycje wyżej i dodaj kilka naraz";
          bulkBtn.onclick=()=>{
            const arr = type==="phrases" ? "phrases" : "vocab";
            if(!lesson[arr]) lesson[arr]=[];
            let added=0;
            const toAdd=Array.from(selectedIndexes).sort((a,b)=>a-b);
            toAdd.forEach(idx=>{
              const item=items[idx];
              if(!lesson[arr].some(v=>v.w===item.w)){
                lesson[arr].push({w:item.w,tr:item.tr,ipa:item.ipa||"",pl:item.pl||"",ex:item.ex||"",exT:item.exT||""});
                added++;
              }
              addedIndexes.add(idx);
              const ref=itemRefs[idx];
              if(ref){ ref.checkbox.checked=false; ref.checkbox.disabled=true; ref.addBtn.textContent="✓"; ref.addBtn.style.color="var(--ok-text)"; ref.addBtn.disabled=true; }
            });
            const ml=Object.assign({},S.myLessons);
            const li=(ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
            if(li>=0){ml[S.lang][li][arr]=lesson[arr];S.myLessons=ml;localStorage.setItem("lingua_my_lessons",JSON.stringify(ml));scheduleDriveSync();}
            selectedIndexes.clear();
            bulkBtn.textContent="✓ Dodano "+added+" do "+(arr==="phrases"?"zwrotów":"fiszek");
            bulkBtn.style.background="var(--ok-text)"; bulkBtn.style.borderColor="var(--ok-text)"; bulkBtn.style.opacity="1"; bulkBtn.disabled=true;
            setTimeout(()=>{ bulkBtn.style.background="var(--gold)"; bulkBtn.style.borderColor="var(--gold)"; updateBulkBtn(); }, 2500);
          };
          btnRow.appendChild(bulkBtn);

          const addAllBtn=document.createElement("button");
          addAllBtn.textContent = type==="phrases" ? "+ Dodaj wszystkie do zwrotów" : "+ Dodaj wszystkie do fiszek";
          addAllBtn.style.cssText="flex:1;min-width:180px;padding:10px 20px;background:none;border:1px solid var(--gold);color:var(--gold);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:.04em;border-radius:4px";
          addAllBtn.onclick=()=>{
            const arr = type==="phrases" ? "phrases" : "vocab";
            if(!lesson[arr]) lesson[arr]=[];
            let added=0;
            items.forEach((item,idx)=>{
              if(!lesson[arr].some(v=>v.w===item.w)){
                lesson[arr].push({w:item.w,tr:item.tr,ipa:item.ipa||"",pl:item.pl||"",ex:item.ex||"",exT:item.exT||""});
                added++;
              }
              addedIndexes.add(idx);
              const ref=itemRefs[idx];
              if(ref){ ref.checkbox.checked=false; ref.checkbox.disabled=true; ref.addBtn.textContent="✓"; ref.addBtn.style.color="var(--ok-text)"; ref.addBtn.disabled=true; }
            });
            const ml=Object.assign({},S.myLessons);
            const li=(ml[S.lang]||[]).findIndex(l=>l.id===lesson.id);
            if(li>=0){ml[S.lang][li][arr]=lesson[arr];S.myLessons=ml;localStorage.setItem("lingua_my_lessons",JSON.stringify(ml));scheduleDriveSync();}
            selectedIndexes.clear();
            addAllBtn.textContent = "✓ Dodano "+added+" nowych do "+(arr==="phrases"?"zwrotów":"fiszek");
            addAllBtn.style.color="var(--ok-text)";addAllBtn.style.borderColor="var(--ok-text)";
            addAllBtn.disabled=true;
            updateBulkBtn();
          };
          btnRow.appendChild(addAllBtn);
          resultDiv.appendChild(btnRow);
        }catch(e){
          btn.innerHTML=type==="vocab"?"📝 <strong>Generuj słówka z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie słówka — dodaj wybrane do fiszek</span>":"💬 <strong>Generuj zwroty z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie zwroty i idiomy — dodaj do fiszek</span>";
          btn.disabled=false;
          alert("Błąd: "+e.message);
          return;
        }
        btn.innerHTML=type==="vocab"?"📝 <strong>Generuj słówka z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie słówka — dodaj wybrane do fiszek</span>":"💬 <strong>Generuj zwroty z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie zwroty i idiomy — dodaj do fiszek</span>";
        btn.disabled=false;
      }});
      mkGenBtn.dataset={};
      const vBtn=mkGenBtn("📝 Generuj słówka z tekstu","vocab","AI wyciągnie słówka z tekstu. Dodaj wybrane do fiszek lekcji.");
      vBtn.dataset.type="vocab";
      vBtn.innerHTML="📝 <strong>Generuj słówka z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie słówka — dodaj wybrane do fiszek</span>";
      const pBtn=mkGenBtn("💬 Generuj zwroty z tekstu","phrases","AI wyciągnie zwroty i wyrażenia. Dodaj wybrane do fiszek lekcji.");
      pBtn.dataset.type="phrases";
      pBtn.innerHTML="💬 <strong>Generuj zwroty z tekstu</strong><br><span style='font-size:11px;color:var(--text2);font-weight:normal'>AI wyciągnie zwroty i idiomy — dodaj do fiszek</span>";
      genRow.appendChild(vBtn);
      genRow.appendChild(pBtn);
      tw.appendChild(genRow);
      const vRes=h("div",{id:"gen-result-vocab",style:"display:none;margin-bottom:20px"});
      const pRes=h("div",{id:"gen-result-phrases",style:"display:none;margin-bottom:20px"});
      tw.appendChild(vRes);
      tw.appendChild(pRes);
    }

    main.appendChild(tw);
  }

  w.appendChild(main);
  return w;
}

function renderPractice(){
  const{lesson,lang,mode,cards,idx,revealed,dir,score,input,submitted}=S;
  const card=cards[idx];
  const w=h("div",{});
  w.appendChild(renderTopNav());
  const main=h("div",{class:"main"});

  // Back wraca tam skąd przyszliśmy (lekcja / Moje słówka / Moje zwroty)
  const _backScreen = S.practiceOrigin === "mywords" ? "mywords"
                    : S.practiceOrigin === "myphrases" ? "myphrases"
                    : S.practiceOrigin === "lesson-vocab" ? "lesson"
                    : S.practiceOrigin === "lesson-phrases" ? "lesson"
                    : "lang";
  const _backLabel = S.practiceOrigin === "mywords" ? "← Moje słówka"
                   : S.practiceOrigin === "myphrases" ? "← Moje zwroty"
                   : S.practiceOrigin === "lesson-vocab" || S.practiceOrigin === "lesson-phrases" ? ("← "+(lesson.title||"Lekcja"))
                   : "← "+LANGS[lang].name;
  main.appendChild(h("button",{class:"back-btn",onclick:()=>set({screen:_backScreen, _vocabTab: S.practiceOrigin==="lesson-phrases"?"phrases":(S.practiceOrigin==="lesson-vocab"?"vocab":S._vocabTab)})}, _backLabel));
  main.appendChild(h("div",{class:"prog-info"},
    h("span",{},(idx+1)+" / "+cards.length+" · "+(mode==="flashcard"?"Fiszki":mode==="fill"?"Uzupełnianie":mode==="writing"?"Pisanie":mode==="dictation"?"Dyktando":"")),
    h("span",{style:"color:var(--gold)"},"✓ "+score.c+" / "+score.t)
  ));
  const pb=h("div",{class:"prog-bar"});
  pb.appendChild(h("div",{class:"prog-fill",style:"width:"+Math.round(idx/cards.length*100)+"%"}));
  main.appendChild(pb);

  if(mode==="flashcard"){
    const fw=h("div",{class:"fc-wrap"});
    const dr=h("div",{class:"dir-row"});
    [["to_pl",LANGS[lang].flag+" → 🇵🇱"],["to_lang","🇵🇱 → "+LANGS[lang].flag],["mix","🔀 Mix"]].forEach(([d,label])=>{
      // Aktywny przycisk = dirMode (nie aktualny dir, który w mix może być losowy)
      dr.appendChild(h("button",{class:"dir-btn"+((S.dirMode||dir)===d?" sel":""),
        onclick:()=>set({dirMode:d, dir:d==="mix"?(Math.random()>.5?"to_pl":"to_lang"):d, revealed:false})},label));
    });
    fw.appendChild(dr);

    const topl=dir==="to_pl";
    const fc=h("div",{class:"fc"+(revealed?" open":""),onclick:()=>{if(!revealed)set({revealed:true});}});
    fc.appendChild(h("div",{class:"fc-lang"},topl?(LANGS[lang].name+" → Polski"):("Polski → "+LANGS[lang].name)));
    if(topl){
      fc.appendChild(h("div",{class:"fc-word"},card.w));
      fc.appendChild(h("button",{class:"spk-btn",style:"font-size:18px;margin:6px 0;opacity:.4",onclick:(e)=>{e.stopPropagation();speak(card.w,lang,"aleksandra");}},"♪"));
      if(!revealed) fc.appendChild(h("div",{class:"hint"},"— dotknij aby ujawnić —"));
      else{
        fc.appendChild(h("div",{class:"fc-tr"},card.tr));
        fc.appendChild(h("div",{class:"fc-ipa"},card.ipa));
        fc.appendChild(h("div",{class:"fc-pl"},"czytaj: "+card.pl));
        if(card.ex){const ex=h("div",{class:"fc-ex"});ex.appendChild(h("div",{},card.ex));ex.appendChild(h("div",{class:"fc-ex-tr"},card.exT));fc.appendChild(ex);}
      }
    } else {
      fc.appendChild(h("div",{class:"fc-tr",style:"font-size:32px;margin-bottom:4px"},card.tr));
      if(!revealed) fc.appendChild(h("div",{class:"hint"},"— dotknij aby ujawnić —"));
      else{
        fc.appendChild(h("div",{class:"fc-word"},card.w));
        fc.appendChild(h("button",{class:"spk-btn",style:"font-size:18px;margin:6px 0;opacity:.4",onclick:(e)=>{e.stopPropagation();speak(card.w,lang,"aleksandra");}},"♪"));
        fc.appendChild(h("div",{class:"fc-ipa"},card.ipa));
        fc.appendChild(h("div",{class:"fc-pl"},"czytaj: "+card.pl));
        if(card.ex){const ex=h("div",{class:"fc-ex"});ex.appendChild(h("div",{},card.ex));ex.appendChild(h("div",{class:"fc-ex-tr"},card.exT));fc.appendChild(ex);}
      }
    }
    fw.appendChild(fc);
    if(revealed){
      const ar=h("div",{class:"ans-row"});
      ar.appendChild(h("button",{class:"btn-no",onclick:()=>{updateSrs(card.w,lang,false);set({score:{c:S.score.c,t:S.score.t+1}});nextCard();}},"✗  Nie wiedziałam"));
      ar.appendChild(h("button",{class:"btn-yes",onclick:()=>{updateSrs(card.w,lang,true);set({score:{c:S.score.c+1,t:S.score.t+1}});nextCard();}},"✓  Wiedziałam"));
      fw.appendChild(ar);
    }
    main.appendChild(fw);
  }

  // ── PISANIE z PL → docelowy ────────────────────────────────────────────────
  if(mode==="writing"){
    const attempts = S.attempts || 0;
    const MAX_ATTEMPTS = 3;
    const fw=h("div",{class:"fc-wrap"});

    // Polskie tłumaczenie do pokazania (lub jeśli brak — bazowa forma)
    const target = card.w;
    const promptPL = card.tr || "(brak tłumaczenia)";
    fw.appendChild(h("div",{style:"font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px"},"Napisz po "+LANGS[lang].name));
    fw.appendChild(h("div",{class:"fc-tr",style:"font-size:28px;margin-bottom:18px;color:var(--text)"},promptPL));

    // Input
    const inp=h("input",{
      type:"text", class:"fill-inp",
      placeholder:"wpisz po "+LANGS[lang].name,
      autocomplete:"off", autocapitalize:"off", spellcheck:"false",
      style:"font-size:20px;width:100%;max-width:520px"
    });
    inp.value = S.input || "";
    inp.oninput = (e)=>{ S.input = e.target.value; };
    fw.appendChild(inp);
    setTimeout(()=>inp.focus(), 50);

    // Pasek znaków specjalnych
    const accentBar = renderAccentBar(lang, inp);
    if(accentBar) fw.appendChild(accentBar);

    // Licznik prób
    if(attempts > 0 && !S.submitted){
      fw.appendChild(h("div",{style:"font-size:12px;color:var(--err-text);margin-bottom:10px"},
        "Próba "+(attempts+1)+" z "+MAX_ATTEMPTS+(card.ipa?" · IPA: "+card.ipa:"")));
    }

    // Status (po submitcie)
    if(S.submitted){
      const ok = S.lastResult==="ok";
      const givenUp = S.lastResult==="givenup";
      if(ok){
        fw.appendChild(h("div",{style:"margin:14px 0;padding:14px;background:var(--ok);color:var(--ok-text);border-radius:6px;font-size:14px"},"✓ Dobrze!"));
        if(card.ex) fw.appendChild(h("div",{class:"fc-ex",style:"margin:10px 0"},
          h("div",{},card.ex), h("div",{class:"fc-ex-tr"},card.exT||"")));
      } else if(givenUp){
        fw.appendChild(h("div",{style:"margin:14px 0;padding:14px;background:var(--err);color:var(--err-text);border-radius:6px"},
          h("div",{style:"font-size:12px;margin-bottom:4px"},"Poprawnie:"),
          h("div",{style:"font-size:20px;font-weight:500"},target),
          card.ipa ? h("div",{style:"font-size:12px;margin-top:4px;opacity:.8"},"IPA: "+card.ipa) : null));
        if(card.ex) fw.appendChild(h("div",{class:"fc-ex",style:"margin:10px 0"},
          h("div",{},card.ex), h("div",{class:"fc-ex-tr"},card.exT||"")));
      }
    }

    const submit = ()=>{
      const inputVal = inp.value;
      const correct = normalizeAnswer(inputVal) === normalizeAnswer(target);
      if(correct){
        updateSrs(target, lang, true);
        set({submitted:true, lastResult:"ok", score:{c:S.score.c+1, t:S.score.t+1}});
        setTimeout(()=>{ if(S.screen==="practice") nextWritingCard(); }, 1800);
      } else if(attempts+1 >= MAX_ATTEMPTS){
        updateSrs(target, lang, false);
        set({submitted:true, lastResult:"givenup", attempts:attempts+1, score:{c:S.score.c, t:S.score.t+1}});
      } else {
        set({attempts:attempts+1});
      }
    };
    inp.onkeydown = (e)=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); }};

    const br=h("div",{style:"display:flex;gap:10px;margin-top:14px;flex-wrap:wrap"});
    if(!S.submitted){
      br.appendChild(h("button",{class:"check-btn",onclick:submit},"Sprawdź"));
      br.appendChild(h("button",{class:"sbtn",onclick:()=>set({submitted:true,lastResult:"givenup",attempts:MAX_ATTEMPTS,score:{c:S.score.c,t:S.score.t+1}})},"Poddaję się"));
      br.appendChild(h("button",{class:"sbtn",style:"opacity:.6",onclick:()=>speak(target,lang,"aleksandra")},"♪ Posłuchaj"));
    } else {
      br.appendChild(h("button",{class:"check-btn",onclick:nextWritingCard},"Dalej →"));
    }
    fw.appendChild(br);
    main.appendChild(fw);
  }

  // ── DYKTANDO: TTS → 2 pola (orto + tłumaczenie PL) ─────────────────────────
  if(mode==="dictation"){
    const attempts = S.attempts || 0;
    const MAX_ATTEMPTS = 3;
    const fw=h("div",{class:"fc-wrap"});
    fw.appendChild(h("div",{style:"font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px"},"Posłuchaj i zapisz"));

    // Play button — duży, klikalny, auto-play przy wejściu na kartę
    const playBtn = h("button",{
      class:"check-btn",

    // Replace ___ with letter-count blanks
const blankedSentence = card.s.replace(/___/g, ()=>{

    const ok=submitted&&input.trim().toLowerCase()===card.a.toLowerCase();

          wordPool.appendChild(h("button",{style:"padding:6px 14px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .15s",

        }
      }
    });
    bw.appendChild(wordPool);
    if(!S.buildSubmitted&&selected.length===card.words.length){

    }
    main.appendChild(bw);
  }

  w.appendChild(main);
  return w;

function isSrtFormat(text){
  if(!text) return false;
  return /\d+:\d+:\d+[.,]\d+\s*-->\s*\d+:\d+:\d+[.,]\d+/.test(text);
}

function parseSrt(text){
  if(!text) return null;
  const blocks = text.replace(/\r\n/g,"\n").split(/\n\s*\n/);
  const cues = [];
  for(const block of blocks){
    const lines = block.trim().split("\n").map(l=>l.trim()).filter(l=>l);
    if(lines.length < 2) continue;
    let tsIdx = -1;
    for(let i=0; i<lines.length; i++){ if(lines[i].includes("-->")){ tsIdx = i; break; } }
    if(tsIdx < 0) continue;
    const m = lines[tsIdx].match(/(\d+):(\d+):(\d+)[.,](\d+)\s*-->\s*(\d+):(\d+):(\d+)[.,](\d+)/);
    if(!m) continue;
    const start = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000;
    const end = parseInt(m[5])*3600 + parseInt(m[6])*60 + parseInt(m[7]) + parseInt(m[8])/1000;
    const textLines = lines.slice(tsIdx+1);
    const txt = textLines.join(" ").replace(/<[^>]+>/g,"").replace(/\{[^}]+\}/g,"").trim();
    if(txt) cues.push({start, end, text:txt});
  }
  return cues.length > 0 ? cues : null;
}

function formatTime(sec){
  if(!isFinite(sec)) return "0:00";
  const s = Math.floor(sec);
  const m = Math.floor(s/60);
  const r = s%60;
  return m+":"+(r<10?"0"+r:r);
}

// Provider-agnostic single call. Returns raw response text (caller does parsing).
// Accepts either a plain string prompt OR an object {prompt, image:{mimeType, data(b64)}}
// for multimodal (image) inputs. Both Gemini and Claude support image inputs.
async function callLessonModel(input){
  const cfg = getLessonModelConfig();
  const promptText = typeof input === "string" ? input : (input.prompt || "");
  const image = (typeof input === "object" && input.image) ? input.image : null;

  if(cfg.provider === "gemini"){
    if(!S.geminiKey) throw new Error("Brak klucza Gemini API w Ustawieniach");
    const parts = [];
    if(image) parts.push({inline_data:{mime_type:image.mimeType, data:image.data}});
    parts.push({text:promptText});
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${cfg.name}:generateContent?key=${encodeURIComponent(S.geminiKey)}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{parts}],
          generationConfig:{temperature:0.3, maxOutputTokens: cfg.maxTokens}
        })
      }
    );
    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      throw new Error("Gemini API "+res.status+": "+(err?.error?.message||"sprawdź klucz lub limit"));
    }
    const data = await res.json();
    const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text || data?.candidates?.[0]?.output || "";
    if(!txt) throw new Error("Gemini nie zwrócił tekstu");
    return txt;
  }
  // Anthropic Claude
  if(!S.claudeKey) throw new Error("Brak klucza Claude w Ustawieniach");
  const content = [];
  if(image) content.push({type:"image", source:{type:"base64", media_type:image.mimeType, data:image.data}});
  content.push({type:"text", text:promptText});
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"x-api-key":S.claudeKey,"anthropic-version":"2023-06-01","content-type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:cfg.name, max_tokens:cfg.maxTokens, messages:[{role:"user",content}]})
  });
  if(!res.ok){
    const e = await res.json().catch(()=>({}));
    throw new Error("Claude API "+res.status+": "+(e?.error?.message||"sprawdź klucz"));
  }
  const data = await res.json();
  return data.content[0].text;
}

// ── Lesson cache: same transcript+lang doesn't cost Claude credits twice ─────
const LESSON_CACHE_KEY = "lingua_lesson_cache";
const LESSON_CACHE_MAX = 30;

function lessonCacheKey(transcript, lang){
  const t = (transcript||"").trim();
  // Quick deterministic fingerprint: length + first 200 + last 200 chars + lang
  // Doesn't need to be cryptographic — just needs to differ for different content
  return (lang||"") + "|" + t.length + "|" + t.slice(0,200).replace(/\s+/g," ").trim() + "||" + t.slice(-200).replace(/\s+/g," ").trim();
}

function getCachedLesson(transcript, lang){
  try{
    const cache = JSON.parse(localStorage.getItem(LESSON_CACHE_KEY)||"{}");
    const k = lessonCacheKey(transcript, lang);
    const entry = cache[k];
    if(!entry) return null;
    // Refresh timestamp (LRU access)
    entry.lastAccess = Date.now();
    localStorage.setItem(LESSON_CACHE_KEY, JSON.stringify(cache));
    return entry.lesson || null;
  }catch(e){ return null; }
}

function setCachedLesson(transcript, lang, lesson){
  try{
    let cache = JSON.parse(localStorage.getItem(LESSON_CACHE_KEY)||"{}");
    const k = lessonCacheKey(transcript, lang);
    // LRU eviction if over capacity
    const entries = Object.entries(cache);
    if(entries.length >= LESSON_CACHE_MAX){
      entries.sort((a,b)=>((a[1].lastAccess||a[1].timestamp||0)-(b[1].lastAccess||b[1].timestamp||0)));
      const toRemove = entries.length - LESSON_CACHE_MAX + 1;
      for(let i=0; i<toRemove; i++) delete cache[entries[i][0]];
    }
    cache[k] = { lesson, timestamp: Date.now(), lastAccess: Date.now() };
    localStorage.setItem(LESSON_CACHE_KEY, JSON.stringify(cache));
    console.log("[LessonCache] saved, total entries:", Object.keys(cache).length);
  }catch(e){
    console.log("[LessonCache] save failed (likely quota):", e.message);
    // Try clearing and saving just this one
    try{
      localStorage.setItem(LESSON_CACHE_KEY, JSON.stringify({[lessonCacheKey(transcript,lang)]:{lesson, timestamp:Date.now(), lastAccess:Date.now()}}));
    }catch(e2){ console.log("[LessonCache] retry also failed"); }
  }
}

function clearLessonCache(){
  localStorage.removeItem(LESSON_CACHE_KEY);
}

// Build a lesson object from a transcript without writing to state — used by
// regenerate-in-place flow. Returns the parsed lesson without setting filmTranscriptLesson.
async function buildLessonFromTranscript(transcript, videoId, cues, lang, opts){
  if(!transcript||!transcript.trim()) throw new Error("Pusta transkrypcja");
  opts = opts || {};
  // CACHE: skip Claude call if we've processed this exact transcript+lang before
  if(!opts.bypassCache){
    const cached = getCachedLesson(transcript, lang);
    if(cached){
      console.log("[LessonCache] HIT — using cached lesson, $0 cost");
      return JSON.parse(JSON.stringify(cached));  // deep copy so caller mutations don't leak
    }
  }
  const _bcfg = getLessonModelConfig();
  if(_bcfg.provider === "gemini" && !S.geminiKey) throw new Error("Brak klucza Gemini w Ustawieniach");
  if(_bcfg.provider === "anthropic" && !S.claudeKey) throw new Error("Brak klucza Claude w Ustawieniach");
  const langNames={EN:"angielski",FR:"francuski",IT:"włoski"};
  // Język docelowy do pól meta (title/topic) — immersja w UI
  const targetLangLabel = {EN:"English",FR:"français",IT:"italiano"}[lang||S.lang]||"target language";
  const targetLangInstr = {
    EN:"title i topic napisz po angielsku (target language)",
    FR:"title i topic napisz po francusku (langue cible)",
    IT:"title i topic napisz po włosku (lingua di studio)"
  }[lang||S.lang] || "title i topic napisz w języku docelowym";
  const COMMON_SECTIONS = `
DODATKOWE SEKCJE:
- vocab: minimum 25 POJEDYNCZYCH słów z dialogu (rzeczowniki, czasowniki, przymiotniki). NIE wkładaj tu zwrotów wielowyrazowych.
  KRYTYCZNE: dla rzeczowników w językach z rodzajem (francuski: le/la/l'/un/une; włoski: il/la/lo/l'/un/una/uno; niemiecki: der/die/das; norweski: en/ei/et — bokmål) ZAWSZE podawaj rodzajnik razem ze słowem w polu "w" (np. "le chien", "la maison", "un homme", "il cane", "la donna", "en bil"). Czasowniki norweskie w bezokoliczniku z å (np. å snakke). Pole "tr" ma rodzajnik polski jeśli pasuje.
  Dla czasowników podawaj formę bezokolicznikową (FR: parler; IT: parlare; EN: to talk). NIE odmienione formy z dialogu.
- phrases: minimum 15 ZWROTÓW i WYRAŻEŃ z dialogu (idiomy, czasowniki frazowe, kolokacje, utarte zwroty).
- fill: minimum 10 ćwiczeń uzupełniania luk — (1) cat:"text" z dialogu (min 5), (2) cat:"grammar" (min 5)
- grammar: minimum 4 zasady gramatyczne widoczne w dialogu`;
  let PROMPT;
  if(cues && cues.length>0){
    const limit = Math.min(cues.length, 1500);
    const formatted = cues.slice(0,limit).map(c=>`[${c.start.toFixed(2)}-${c.end.toFixed(2)}] ${c.text}`).join("\n");
    PROMPT = `Masz transkrypcję z timestampami w języku ${langNames[lang||S.lang]||"angielski"}. Każda linia: [start-end] tekst (sekundy).\n\nZADANIE:\n1. POŁĄCZ kolejne linie tej samej osoby w jedną kwestię. Zachowaj start pierwszej i end ostatniej.\n2. JEŚLI linia zawiera wypowiedzi DWÓCH+ postaci, ROZDZIEL.\n3. POPRAW INTERPUNKCJĘ I KAPITALIZACJĘ (transkrypcje YT są lowercase).\n4. Rozpoznaj kto mówi UWAŻNIE — Friends: Monica/Chandler/Ross/Joey/Rachel/Phoebe; inne seriale podobnie. Dla nieznanych Speaker1, Speaker2.\n5. Każda kwestia ma "start" i "end" (sekundy float) — KRYTYCZNE dla sync z wideo.\n6. Przetłumacz dialog na polski naturalnie (pole "t").\n7. ${targetLangInstr}.${COMMON_SECTIONS}\n\nOdpowiedz TYLKO czystym JSON bez markdown:\n{"title":"tytuł sceny po ${targetLangLabel}","level":"A2","topic":"temat językowy po ${targetLangLabel}","dialog":[{"s":"imię","l":"tekst","t":"tłumaczenie PL","start":1.23,"end":4.56}],"vocab":[{"w":"słowo","tr":"tłumaczenie","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"phrases":[{"w":"zwrot","tr":"tłumaczenie","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"fill":[{"s":"zdanie z ___","a":"odp","h":"wskazówka","cat":"text"}],"grammar":[{"rule":"zasada","ex":"przykład","exT":"tłumaczenie","note":"wyjaśnienie PL"}]}\n\nTRANSKRYPCJA Z TIMESTAMPAMI:\n${formatted}`;
  } else {
    const trim=transcript.slice(0,40000);
    PROMPT=`Masz surową transkrypcję w języku ${langNames[lang||S.lang]||"angielski"}. Przerób na lekcję językową.\n\nZASADY: Weź każde zdanie DOSŁOWNIE, NIE skracaj. POPRAW interpunkcję/kapitalizację. Rozpoznaj kto mówi. ${targetLangInstr}.${COMMON_SECTIONS}\n\nOdpowiedz TYLKO czystym JSON bez markdown:\n{"title":"tytuł sceny po ${targetLangLabel}","level":"A2","topic":"temat językowy po ${targetLangLabel}","dialog":[{"s":"imię","l":"tekst","t":"tłumaczenie PL"}],"vocab":[{"w":"słowo","tr":"tłumaczenie","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"phrases":[{"w":"zwrot","tr":"tłumaczenie","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"fill":[{"s":"zdanie z ___","a":"odp","h":"wskazówka","cat":"text"}],"grammar":[{"rule":"zasada","ex":"przykład","exT":"tłumaczenie","note":"wyjaśnienie PL"}]}\n\nTRANSKRYPCJA:\n${trim}`;
  }
  const rawText = await callLessonModel(PROMPT);
  const newLesson = parseLessonJson(rawText);
  if(!newLesson.dialog || newLesson.dialog.length===0) throw new Error("Claude nie zwrócił dialogu");
  // Doczep timestampy do dialogu jeśli mamy cues (Gemini czasem wyrzuca start/end z output)
  if(cues && cues.length>0){
    const hasTimestamps = newLesson.dialog.some(d => typeof d.start === "number");
    if(!hasTimestamps){
      // Greedy mapowanie: każda linijka dialogu konsumuje kolejne cues po długości tekstu
      // start = pierwszy cue, end = ostatni cue w danej linijce
      let cueIdx = 0;
      const totalCues = cues.length;
      for(const line of newLesson.dialog){
        if(cueIdx >= totalCues) break;
        const lineLen = (line.l||"").length;
        const startCue = cueIdx;
        let consumed = 0;
        // Konsumuj cues aż uzbieramy ~lineLen znaków (lub min 1 cue)
        while(cueIdx < totalCues && consumed < lineLen * 0.9){
          consumed += (cues[cueIdx].text||"").length + 1; // +1 za spację
          cueIdx++;
        }
        if(cueIdx === startCue) cueIdx++; // zawsze choć 1 cue
        const lastCueIdx = Math.min(cueIdx-1, totalCues-1);
        line.start = cues[startCue].start;
        line.end = cues[lastCueIdx].end;
      }
      console.log("[Lingua] Reattached timestamps from", totalCues, "cues to", newLesson.dialog.length, "dialog lines");
    }
  }
  // Cache the result so the same transcript doesn't cost again
  setCachedLesson(transcript, lang, newLesson);
  return newLesson;
}

  if(_rcfg.provider === "anthropic" && !S.claudeKey){ alert("Skonfiguruj klucz Claude w Ustawieniach (albo zmień model na Gemini)"); return; }
  const videoId = lesson.youtubeId || null;
  const savedRaw = (lesson.rawText||"").trim();
  const haveSaved = savedRaw.length > 100;
  const forceFetch = !!opts.forceFetch;
  // Choose source: existing rawText takes priority unless caller forces a fresh YouTube fetch
  let transcript = "", cues = null, sourceLabel = "";
  if(!forceFetch && haveSaved){
    transcript = savedRaw;
    if(isSrtFormat(transcript)) cues = parseSrt(transcript);
    sourceLabel = "zapisany tekst lekcji" + (cues ? " (SRT, "+cues.length+" cues)" : " ("+savedRaw.length+" znaków)");
  } else {
    if(!videoId){
      alert("Lekcja nie ma zapisanego tekstu ani linku YouTube — nic do regeneracji"); return;
    }
    if(!S.workerUrl && !S.rapidKey){
      alert("Lekcja nie ma zapisanego tekstu, a brakuje Workera/RapidAPI do pobrania z YouTube. Dodaj rawText lub skonfiguruj w Ustawieniach.");
      return;
    }
    sourceLabel = "pobrać świeży transkrypt z YouTube ("+videoId+")";
  }
  if(!confirm("Regeneracja użyje: "+sourceLabel+".\n\nObecne dialog, słówka, zwroty, ćwiczenia i gramatyka ZOSTANĄ NADPISANE. Ręcznie dodane pozycje zostaną utracone.\n\nKontynuować?")) return;
  set({filmTranscriptLoading:true, filmTranscriptError:"", filmTranscriptDraft:""});
  showRegenStatus("🔄 Regeneruję lekcję z: "+sourceLabel+" — to potrwa 30-60s. Nie zamykaj karty.", "info");
  console.log("[Regenerate] Starting, source:", sourceLabel, "transcript chars:", transcript.length);
  try{
    if(forceFetch || !haveSaved){
      // Fetch from YouTube
      if(S.workerUrl){
        try{
          const data = await fetchViaWorker(videoId);
          transcript = data.srt || "";
          cues = data.cues || null;
        }catch(e){
          throw new Error("Worker: "+e.message);
        }
      } else if(S.rapidKey){
        transcript = await fetchYouTubeTranscript(videoId);
        if(transcript && isSrtFormat(transcript)) cues = parseSrt(transcript);
      } else {
        throw new Error("Skonfiguruj Worker albo klucz RapidAPI w Ustawieniach");
      }
    }
    if(!transcript || transcript.length<30) throw new Error("Transkrypt jest pusty");
    const newLesson = await buildLessonFromTranscript(transcript, videoId, cues, lang);
    // Overwrite fields, KEEP id/clipId/folder/youtubeId/source/seriesTitle/clipTitle
    const ml = Object.assign({}, S.myLessons);
    const li = (ml[lang]||[]).findIndex(l => l.id === lesson.id);
    if(li < 0){ throw new Error("Nie znaleziono lekcji do nadpisania"); }
    const old = ml[lang][li];
    ml[lang][li] = Object.assign({}, old, {
      title: newLesson.title || old.title,
      topic: newLesson.topic || old.topic || "",
      level: newLesson.level || old.level || "A2",
      dialog: newLesson.dialog || [],
      vocab: newLesson.vocab || [],
      phrases: newLesson.phrases || [],
      fill: newLesson.fill || [],
      grammar: newLesson.grammar || [],
      rawText: transcript
    });
    S.myLessons = ml;
    localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
    scheduleDriveSync();
    // Update the live lesson object so screen=="lesson" reflects changes
    Object.assign(lesson, ml[lang][li]);
    set({filmTranscriptLoading:false});
    console.log("[Regenerate] Done:", (newLesson.dialog||[]).length, "dialog,", (newLesson.vocab||[]).length, "vocab,", (newLesson.phrases||[]).length, "phrases");
    const ok = showRegenStatus("✓ Zregenerowana: "+(newLesson.dialog||[]).length+" kwestii, "+(newLesson.vocab||[]).length+" słówek, "+(newLesson.phrases||[]).length+" zwrotów", "success");
    setTimeout(()=>{ if(ok) ok.remove(); }, 4000);
  }catch(e){
    console.error("[Regenerate]", e);
    set({filmTranscriptLoading:false, filmTranscriptError:"Błąd: "+e.message});
    const errBanner = showRegenStatus("❌ Błąd regeneracji: "+e.message, "error");
    if(errBanner){
      const closeBtn = document.createElement("button");
      closeBtn.style.cssText = "margin-left:14px;background:none;border:none;color:inherit;cursor:pointer;font-size:18px;line-height:1;padding:0 4px";
      closeBtn.textContent = "✕";
      closeBtn.onclick = ()=>errBanner.remove();
      errBanner.appendChild(closeBtn);
      setTimeout(()=>{ if(errBanner && errBanner.parentNode) errBanner.remove(); }, 8000);
    }
  }
}

async function fetchViaWorker(videoId){
  if(!S.workerUrl){ throw new Error("Worker nie skonfigurowany — wejdź w Ustawienia → 🎬 Worker do transkrypcji YouTube"); }
  const base = S.workerUrl.replace(/\/+$/, "");
  const langMap = {EN:"en", FR:"fr", IT:"it"};
  const lang = langMap[S.lang] || "en";
  const url = `${base}/?id=${encodeURIComponent(videoId)}&lang=${lang}`;
  const res = await fetch(url);
  if(!res.ok){
    const body = await res.json().catch(()=>({}));
    throw new Error(body.error || ("Worker HTTP "+res.status));
  }
  const data = await res.json();
  if(!data.cues || !Array.isArray(data.cues) || data.cues.length===0){
    throw new Error("Worker zwrócił pustą transkrypcję");
  }
  return data;
}

// Gemini ogląda wideo z YouTube bezpośrednio przez fileData.fileUri — nie potrzebuje
// napisów ani Workera. Tworzy lekcję z audio (transkrybuje sam) + tłumaczenie.
// Działa dla filmików bez napisów. Limit: 8h/dzień darmowo, do ~2h jednego klipu.
async function processYouTubeViaGemini(youtubeUrl, lang){
  if(!S.geminiKey) throw new Error("Brak klucza Gemini w Ustawieniach (Gemini direct YT wymaga klucza Google)");
  const langNames={EN:"angielskim",FR:"francuskim",IT:"włoskim"};
  const targetLangLabel = {EN:"English",FR:"français",IT:"italiano"}[lang]||lang;
  const targetLangInstr = {
    EN:"title i topic napisz po angielsku",
    FR:"title i topic napisz po francusku",
    IT:"title i topic napisz po włosku"
  }[lang] || "title i topic napisz w języku docelowym";

  const PROMPT = `Obejrzyj to wideo z YouTube. Transkrybuj dialog w języku ${langNames[lang]||"oryginalnym"} dokładnie z audio i stwórz pełną lekcję językową.

ZADANIE:
1. TRANSKRYPCJA: wypisz każdą wypowiedź z audio z timestampem początku (sekundy float). Identyfikuj mówiących (imiona postaci jeśli znane z kontekstu; inaczej Speaker1/Speaker2).
2. POPRAW interpunkcję i kapitalizację (audio to mowa, dodaj kropki, przecinki, znaki zapytania).
3. PRZETŁUMACZ każdą kwestię na polski naturalnie (pole "t").
4. ${targetLangInstr}.

DODATKOWE SEKCJE:
- vocab: minimum 25 POJEDYNCZYCH słów z dialogu.
  KRYTYCZNE: rzeczowniki w językach z rodzajem (FR: le/la/un/une; IT: il/la/lo/un/una/uno; NO: en/ei/et — bokmål) ZAWSZE z rodzajnikiem w polu "w" (np. "le chien", "la maison", "en bil"). Czasowniki w bezokoliczniku (å snakke).
- phrases: minimum 15 ZWROTÓW i WYRAŻEŃ z dialogu (idiomy, czasowniki frazowe)
- fill: minimum 10 ćwiczeń (cat:"text" min 5, cat:"grammar" min 5)
- grammar: minimum 4 zasady gramatyczne

Odpowiedz TYLKO czystym JSON bez markdown:
{"title":"tytuł po ${targetLangLabel}","level":"A2","topic":"temat po ${targetLangLabel}","dialog":[{"s":"imię","l":"tekst","t":"tłumaczenie PL","start":1.23,"end":4.56}],"vocab":[{"w":"słowo","tr":"tłumaczenie PL","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"phrases":[{"w":"zwrot","tr":"tłumaczenie","ipa":"IPA","pl":"wymowa PL","ex":"zdanie","exT":"tłumaczenie"}],"fill":[{"s":"zdanie z ___","a":"odp","h":"wskazówka","cat":"text"}],"grammar":[{"rule":"zasada","ex":"przykład","exT":"tłumaczenie","note":"wyjaśnienie PL"}]}`;

  const cfg = getLessonModelConfig();
  // Wymuszamy Gemini niezależnie od wybranego modelu (tylko Gemini obsługuje YT URL)
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(S.geminiKey)}`,
    {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        contents:[{parts:[
          { fileData: { fileUri: youtubeUrl, mimeType: "video/*" } },
          { text: PROMPT }
        ]}],
        generationConfig:{
          temperature:0.2,
          maxOutputTokens: 32000,
          thinkingConfig:{thinkingBudget:0} // krytyczne — bez tego YT video często wraca pusto
        }
      })
    }
  );
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    const msg = err?.error?.message||"sprawdź klucz/limit";
    if(res.status === 429) throw new Error("Gemini 429: limit dzienny YouTube (8h/dzień) — spróbuj jutro");
    if(res.status === 400 && /not supported/i.test(msg)) throw new Error("Gemini nie potrafi przetworzyć tego filmu (może być prywatny, age-restricted lub zbyt długi)");
    throw new Error("Gemini "+res.status+": "+msg);
  }
  const data = await res.json();
  const txt = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  if(!txt) throw new Error("Gemini zwrócił pustą odpowiedź — film może być za długi");
  const newLesson = parseLessonJson(txt);
  if(!newLesson.dialog || newLesson.dialog.length===0) throw new Error("Gemini nie zwrócił dialogu");
  return newLesson;
}

async function processManualPasteTranscript(){
  const text=(S.filmManualPaste||"").trim();
  if(text.length<30){set({filmTranscriptError:"Wklej dłuższą transkrypcję (min ~30 znaków)"});return;}
  // Route through draft so user can edit
  set({
    filmTranscriptDraft: text,
    filmTranscriptDraftVideoId: S.filmYtId||null,
    filmManualPaste: "",
    filmTranscriptError: ""
  });
}

        const btn = h("button",{class:"primary",style:"white-space:nowrap;padding:9px 18px"},"Przypisz");
        btn.onclick = ()=>{
          const lid = sel.value;

          const ml = Object.assign({},S.myLessons);
          const arr = (ml[lang]||[]).slice();

          localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));

// ── B1: SPACED REPETITION ──────────────────────────────────────────────────
const SRS_INTERVALS=[1,3,7,14,30];
function getSrsKey(word,lang){return (word||"").toLowerCase().trim()+"_"+lang;}
function updateSrs(word,lang,correct){
  const srs=Object.assign({},S.srs);
  const k=getSrsKey(word,lang);
  const entry=srs[k]||{level:0,next:new Date().toISOString().slice(0,10)};
  if(correct){entry.level=Math.min(entry.level+1,SRS_INTERVALS.length-1);}else{entry.level=0;}
  const days=SRS_INTERVALS[entry.level];
  const d=new Date();d.setDate(d.getDate()+days);
  entry.next=d.toISOString().slice(0,10);
  entry.word=word;entry.lang=lang;
  srs[k]=entry;
  localStorage.setItem("lingua_srs",JSON.stringify(srs));
  set({srs});
}
function getDueWords(lang){
  const today=new Date().toISOString().slice(0,10);
  return Object.values(S.srs).filter(e=>e.lang===lang&&e.next<=today);
}

function startQuiz(lesson){
  if(!lesson.vocab||lesson.vocab.length<4){alert("Potrzeba minimum 4 słówek do quizu");return;}
  const cards=lesson.vocab.map((v,i)=>{
    const others=lesson.vocab.filter((_,j)=>j!==i);
    const shuffled=others.sort(()=>Math.random()-.5).slice(0,3);
    const dir=Math.random()>.5?"to_pl":"to_lang";
    const correct=dir==="to_pl"?v.tr:v.w;
    const question=dir==="to_pl"?v.w:v.tr;
    const options=[correct,...shuffled.map(s=>dir==="to_pl"?s.tr:s.w)].sort(()=>Math.random()-.5);
    return{question,correct,options,dir,word:v.w};
  }).sort(()=>Math.random()-.5);
  set({screen:"practice",lesson,mode:"quiz",cards,idx:0,score:{c:0,t:0},quizAnswer:null,quizSubmitted:false});
}

// ── B5: SENTENCE BUILDER ────────────────────────────────────────────────────
function startBuild(lesson){
  if(!lesson.dialog||lesson.dialog.length<3){alert("Za mało dialogu do układania zdań");return;}
  const cards=lesson.dialog.filter(d=>d.l.split(/\s+/).length>=4&&d.l.split(/\s+/).length<=15).slice(0,10).map(d=>{
    const words=d.l.replace(/[.,!?;:]/g,"").split(/\s+/).filter(Boolean);
    const shuffled=[...words].sort(()=>Math.random()-.5);
    return{original:d.l,words,shuffled,translation:d.t,speaker:d.s};
  });
  if(cards.length<2){alert("Za mało odpowiednich zdań do układania");return;}
  set({screen:"practice",lesson,mode:"build",cards,idx:0,score:{c:0,t:0},buildSelected:[],buildSubmitted:false});
}

let _translateRecognition = null;
function stopTranslateSpeech(){
  if(_translateRecognition){ try{_translateRecognition.stop();}catch(e){} _translateRecognition=null; }
  S.translateRecording=false;
}
function startTranslateSpeech(){
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!Rec){ alert("Twoja przeglądarka nie obsługuje rozpoznawania mowy (Chrome/Edge tak)"); return; }
  stopTranslateSpeech();
  const r = new Rec();
  _translateRecognition = r;
  r.lang = "pl-PL";
  r.continuous = false;
  r.interimResults = true;
  S.translateRecording = true;
  render();
  let finalChunk = "";
  r.onresult = (e)=>{
    let interim = "";
    for(let i=e.resultIndex; i<e.results.length; i++){
      const txt = e.results[i][0].transcript;
      if(e.results[i].isFinal) finalChunk += txt;
      else interim += txt;
    }
    const ta = document.getElementById("translate-input");
    if(ta){
      const base = S.translateInput || "";
      const sep = base && !base.endsWith(" ") ? " " : "";
      ta.value = base + sep + finalChunk + interim;
    }
  };
  r.onend = ()=>{
    const ta = document.getElementById("translate-input");
    const newVal = ta ? ta.value : ((S.translateInput||"")+" "+finalChunk).trim();
    _translateRecognition = null;
    set({translateRecording:false, translateInput:newVal});
  };
  r.onerror = (ev)=>{
    _translateRecognition = null;
    set({translateRecording:false, translateError:"Błąd mikrofonu: "+ev.error});
  };
  r.start();
}

async function doTranslate(){
  const text = (S.translateInput||"").trim();
  if(!text){ set({translateError:"Wpisz tekst do tłumaczenia"}); return; }
  const _tcfg = getLessonModelConfig();
  if(_tcfg.provider === "gemini" && !S.geminiKey){ set({translateError:"Wymagany klucz Gemini w Ustawieniach"}); return; }
  if(_tcfg.provider === "anthropic" && !S.claudeKey){ set({translateError:"Wymagany klucz Claude (Anthropic) w Ustawieniach"}); return; }
  set({translateProcessing:true, translateError:"", translateResult:null});
  try{
    const lang = S.lang;
    const langName = {EN:"angielski",FR:"francuski",IT:"włoski"}[lang]||"obcy";
    const langAdj = {EN:"angielskim",FR:"francuskim",IT:"włoskim"}[lang]||"obcym";
    const prompt = `Przetłumacz poniższy polski tekst na ${langName} naturalnie, jak rodzimy użytkownik. Podaj też wymowę pełnego tłumaczenia (IPA i intuicyjną fonetykę po polsku) oraz wyciągnij kluczowe słowa i zwroty z tłumaczenia godne zapamiętania.\n\nTEKST PO POLSKU: "${text}"\n\nOdpowiedz TYLKO czystym JSON, bez markdown:\n{"translation":"tłumaczenie w ${langAdj}","ipa":"IPA pełnego tłumaczenia","pl":"jak czytać po polsku","alternatives":["alternatywne tłumaczenia (opcjonalnie 1-2)"],"words":[{"w":"słowo lub zwrot","tr":"po polsku","ipa":"IPA","pl":"czytaj","ex":"przykład użycia po ${langName}u","exT":"tłumaczenie przykładu"}]}\n\nwords: kluczowe słowa/zwroty z tłumaczenia (5-12 pozycji).`;
    const rawText = await callLessonModel(prompt);
    const m = rawText.match(/\{[\s\S]*\}/);
    if(!m) throw new Error("Brak JSON w odpowiedzi");
    const parsed = JSON.parse(m[0]);
    set({translateProcessing:false, translateResult:parsed});
  }catch(e){
    set({translateProcessing:false, translateError:e.message});
  }
}

function addTranslateToLesson(target){
  const r = S.translateResult;
  if(!r) return;
  const lessons = S.myLessons[S.lang]||[];
  if(lessons.length===0){ alert("Nie masz własnych lekcji w tym języku. Wgraj/dodaj lekcję najpierw."); return; }
  let lessonId = S.translateAddTargetLesson;
  if(!lessonId || !lessons.find(l=>l.id===lessonId)) lessonId = lessons[0].id;
  const ml = Object.assign({}, S.myLessons);
  const lessonIdx = (ml[S.lang]||[]).findIndex(l=>l.id===lessonId);
  if(lessonIdx<0){ alert("Wybrana lekcja nie istnieje"); return; }
  const lesson = ml[S.lang][lessonIdx];
  if(target==="phrases"){
    if(!lesson.phrases) lesson.phrases=[];
    if(lesson.phrases.some(p=>p.w===r.translation)){ alert("Ten zwrot już jest w lekcji \""+lesson.title+"\""); return; }
    lesson.phrases.push({w:r.translation, tr:(S.translateInput||"").trim(), ipa:r.ipa||"", pl:r.pl||"", ex:"", exT:""});
    localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
    S.myLessons = ml; scheduleDriveSync();
    alert("✓ Dodano zdanie do Zwrotów lekcji \""+lesson.title+"\"");
    render();
  } else if(target==="vocab"){
    if(!lesson.vocab) lesson.vocab=[];
    let added=0;
    (r.words||[]).forEach(word=>{
      if(!lesson.vocab.some(v=>v.w===word.w)){
        lesson.vocab.push({w:word.w, tr:word.tr, ipa:word.ipa||"", pl:word.pl||"", ex:word.ex||r.translation||"", exT:word.exT||(S.translateInput||"").trim()});
        added++;
      }
    });
    localStorage.setItem("lingua_my_lessons", JSON.stringify(ml));
    S.myLessons = ml; scheduleDriveSync();
    alert("✓ Dodano "+added+" słówek do lekcji \""+lesson.title+"\"");
    render();
  }
}
