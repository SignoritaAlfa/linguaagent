// Uniwersalny renderer dla "Moje słówka" i "Moje zwroty"
// cfg = {type:"words"|"phrases", storageKey, title, sub, addPlaceholder, origin, emptyHint}
function renderMyVocab(cfg){
  const{lang}=S;
  const ws=JSON.parse(localStorage.getItem(cfg.storageKey)||"{}");
  const learning=[];const known=[];
  Object.entries(ws).forEach(([k,v])=>{
    if(!k.endsWith("_"+lang))return;
    const word=k.slice(0,-(lang.length+1));
    if(v==="learning")learning.push(word);
    else if(v==="known")known.push(word);
  });
  const w=h("div",{});
  w.appendChild(renderTopNav());
  w.appendChild(h("div",{class:"lang-hero"},
    ...Object.entries(LANGS).map(([code,l])=>h("button",{class:"lang-tab"+(lang===code?" sel":""),
      onclick:()=>set({lang:code})},h("span",{class:"lang-flag"},l.flag),h("span",{class:"lang-name"},l.name)))
  ));
  const main=h("div",{class:"main"});
  main.appendChild(h("button",{class:"back-btn",onclick:()=>set({screen:"lang"})},"← Lekcje"));
  main.appendChild(h("div",{class:"page-title"},cfg.title));
  main.appendChild(h("div",{class:"page-sub"},cfg.sub+" — "+LANGS[lang].name));
  // Stats
  main.appendChild(h("div",{style:"display:flex;gap:20px;margin-bottom:28px"},
    h("div",{style:"padding:16px 24px;background:var(--surface);border:1px solid var(--border);flex:1;text-align:center"},
      h("div",{style:"font-size:28px;font-family:'Cormorant Garamond',serif;color:var(--gold)"},""+learning.length),
      h("div",{style:"font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:4px"},"Uczę się")),
    h("div",{style:"padding:16px 24px;background:var(--surface);border:1px solid var(--border);flex:1;text-align:center"},
      h("div",{style:"font-size:28px;font-family:'Cormorant Garamond',serif;color:var(--ok-text)"},""+known.length),
      h("div",{style:"font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:4px"},"Znam"))
  ));

  // ── Sesje nauki (Fiszki / Pisanie / Dyktando) ──
  const enriched = learning.map(w => getEnrichedVocabEntry(w, lang) || {w, tr:"", ipa:"", pl:"", ex:"", exT:""});
  const ready = enriched.filter(e => e.tr && e.tr.trim());
  if(learning.length > 0){
    const practiceBox = h("div",{style:"background:var(--surface);border:1px solid var(--border);padding:16px 20px;margin-bottom:28px;border-radius:6px"});
    practiceBox.appendChild(h("div",{class:"sec-label",style:"margin-bottom:10px"},"Ucz się"));
    if(ready.length > 0){
      const itemLabel = cfg.type==="phrases" ? "zwrotów" : "słówek";
      practiceBox.appendChild(h("div",{style:"font-size:12px;color:var(--text3);margin-bottom:10px"},
        ready.length+" z "+learning.length+" "+itemLabel+" ma tłumaczenie — tylko te wejdą do sesji. "+
        (ready.length < learning.length ? "Reszta uzupełni się gdy klikniesz w lekcji (popup tłumaczenia)." : "")));
      const fakeLesson = {vocab: ready, id:cfg.type+"_"+lang, title:cfg.title};
      const br = h("div",{style:"display:flex;gap:8px;flex-wrap:wrap"});
      br.appendChild(h("button",{class:"sbtn",onclick:()=>startPractice(fakeLesson,"flashcard",cfg.origin)},"🃏 Fiszki"));
      br.appendChild(h("button",{class:"sbtn",onclick:()=>startPractice(fakeLesson,"writing",cfg.origin)},"✍️ Pisanie z PL"));
      br.appendChild(h("button",{class:"sbtn",onclick:()=>startPractice(fakeLesson,"dictation",cfg.origin)},"🎧 Dyktando"));
      practiceBox.appendChild(br);
    } else {
      practiceBox.appendChild(h("div",{style:"font-size:12px;color:var(--text3)"},cfg.emptyHint));
    }
    main.appendChild(practiceBox);
  }

  // Formularz "Dodaj ręcznie"
  const addBox = h("div",{style:"background:var(--surface);border:1px solid var(--border);padding:16px 20px;margin-bottom:28px;border-radius:6px"});
  addBox.appendChild(h("div",{class:"sec-label",style:"margin-bottom:10px"},cfg.type==="phrases"?"Dodaj zwrot ręcznie":"Dodaj słówko ręcznie"));
  const addRow = h("div",{style:"display:flex;gap:8px;flex-wrap:wrap;align-items:center"});
  const addInp = h("input",{type:"text",placeholder:cfg.addPlaceholder+" w "+LANGS[lang].name,style:"flex:1;min-width:200px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:14px;border-radius:4px"});
  const addBtn = h("button",{class:"primary"},"+ Dodaj do Uczę się");
  const submit = ()=>{
    const word = (addInp.value||"").trim().toLowerCase();
    if(!word) return;
    const ws2 = JSON.parse(localStorage.getItem(cfg.storageKey)||"{}");
    if(ws2[word+"_"+lang] === "learning"){ alert("\""+word+"\" już jest na liście Uczę się"); return; }
    ws2[word+"_"+lang] = "learning";
    localStorage.setItem(cfg.storageKey, JSON.stringify(ws2));
    scheduleDriveSync();
    addInp.value = "";
    render();
  };
  addBtn.onclick = submit;
  addInp.onkeydown = (e)=>{ if(e.key==="Enter") submit(); };
  addRow.appendChild(addInp);
  addRow.appendChild(addBtn);
  addBox.appendChild(addRow);
  main.appendChild(addBox);

  if(learning.length>0){
    main.appendChild(h("div",{class:"sec-label"},"Uczę się ("+learning.length+")"));
    const list=h("div",{style:"margin-bottom:28px"});
    learning.forEach(word=>{
      const row=h("div",{style:"display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"});
      row.appendChild(h("div",{style:"font-size:14px;color:var(--text)"},word));
      const btns=h("div",{style:"display:flex;gap:6px"});
      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px",onclick:()=>{ws[word+"_"+lang]="known";localStorage.setItem(cfg.storageKey,JSON.stringify(ws));render();}},"Znam"));
      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px;color:var(--err-text);border-color:var(--err-text)",onclick:()=>{delete ws[word+"_"+lang];localStorage.setItem(cfg.storageKey,JSON.stringify(ws));render();}},"Usuń"));
      row.appendChild(btns);list.appendChild(row);
    });
    main.appendChild(list);
  }
  if(known.length>0){
    main.appendChild(h("div",{class:"sec-label"},"Znam ("+known.length+")"));
    const list=h("div",{style:"margin-bottom:28px"});
    known.forEach(word=>{
      const row=h("div",{style:"display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"});
      row.appendChild(h("div",{style:"font-size:14px;color:var(--text)"},word));
      const btns=h("div",{style:"display:flex;gap:6px"});
      btns.appendChild(h("button",{class:"sbtn",style:"font-size:10px;padding:4px 10px",onclick:()=>{ws[word+"_"+lang]="learning";localStorage.setItem(cfg.storageKey,JSON.stringify(ws));render();}},"Ucz się"));
      row.appendChild(btns);list.appendChild(row);
    });
    main.appendChild(list);
  }
  if(learning.length===0&&known.length===0){
    const emptyTxt = cfg.type==="phrases"?"Brak zapisanych zwrotów":"Brak zapisanych słówek";
    main.appendChild(h("div",{class:"empty"},h("div",{class:"empty-icon"},"📝"),h("div",{class:"empty-text"},emptyTxt),h("div",{class:"empty-sub"},"Dodaj ręcznie powyżej, kliknij słowo w dialogu, albo klik 📖 przy słówku/zwrocie w lekcji")));
  }
  w.appendChild(main);return w;
}

// ── B7: EKSPORT/IMPORT ─────────────────────────────────────────────────────
function exportAllData(){
  const data={myLessons:S.myLessons,lessonFolders:S.lessonFolders,myFilms:S.myFilms,wordStatus:JSON.parse(localStorage.getItem("lingua_word_status")||"{}"),srs:S.srs};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="lingua_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();
  URL.revokeObjectURL(url);
}
function importData(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.myLessons){const ml=Object.assign({},S.myLessons);Object.entries(data.myLessons).forEach(([lang,lessons])=>{if(!ml[lang])ml[lang]=[];ml[lang].push(...lessons);});localStorage.setItem("lingua_my_lessons",JSON.stringify(ml));S.myLessons=ml;}
      if(data.lessonFolders){const lf=Object.assign({},S.lessonFolders);Object.entries(data.lessonFolders).forEach(([lang,folders])=>{if(!lf[lang])lf[lang]=[];folders.forEach(f=>{if(!lf[lang].includes(f))lf[lang].push(f);});});localStorage.setItem("lingua_lesson_folders",JSON.stringify(lf));S.lessonFolders=lf;}
      if(data.myFilms){const mf=Object.assign({},S.myFilms);Object.entries(data.myFilms).forEach(([lang,films])=>{if(!mf[lang])mf[lang]=[];mf[lang].push(...films);});localStorage.setItem("lingua_my_films",JSON.stringify(mf));S.myFilms=mf;}
      if(data.wordStatus){const ws=JSON.parse(localStorage.getItem("lingua_word_status")||"{}");Object.assign(ws,data.wordStatus);localStorage.setItem("lingua_word_status",JSON.stringify(ws));}
      if(data.srs){const srs=Object.assign({},S.srs,data.srs);localStorage.setItem("lingua_srs",JSON.stringify(srs));S.srs=srs;}
      alert("Import zakończony! Zaimportowano dane.");render();
    }catch(e){alert("Błąd importu: "+e.message);}
  };
  r.readAsText(file);
}

// ── B8: DARK/LIGHT THEME ───────────────────────────────────────────────────
function applyTheme(theme){
  const r=document.documentElement;
  const paletteId = S.palette || "green";
  const palette = PALETTES[paletteId] || PALETTES.green;
  const accent = theme==="dark" ? palette.dark : palette.light;
  if(theme==="dark"){
    r.style.setProperty("--bg","#0e1117");r.style.setProperty("--bg2","#161b22");r.style.setProperty("--bg3","#1c2330");
    r.style.setProperty("--surface","#161b22");r.style.setProperty("--surface2","#1c2330");
    r.style.setProperty("--border","#2a3142");r.style.setProperty("--border2","#3a4254");
    r.style.setProperty("--text","#e8eaed");r.style.setProperty("--text2","#b0b7c2");r.style.setProperty("--text3","#7a8190");
    r.style.setProperty("--green-light","#7dc296");
    r.style.setProperty("--red","#e63946");r.style.setProperty("--red2","#ff5a68");r.style.setProperty("--red-dim","#3a1a1c");
    r.style.setProperty("--ok","#1a3522");r.style.setProperty("--ok-text","#7dc296");
    r.style.setProperty("--err","#3a1a1c");r.style.setProperty("--err-text","#ff8a92");
    document.body.style.background="#0e1117";document.documentElement.style.background="#0e1117";
  }else{
    r.style.setProperty("--bg","#ffffff");r.style.setProperty("--bg2","#f0f4f8");r.style.setProperty("--bg3","#e5ebf2");
    r.style.setProperty("--surface","#ffffff");r.style.setProperty("--surface2","#f7f9fc");
    r.style.setProperty("--border","#e4e7eb");r.style.setProperty("--border2","#d4d8df");
    r.style.setProperty("--text","#0e1117");r.style.setProperty("--text2","#3a3f4b");r.style.setProperty("--text3","#6b7280");
    r.style.setProperty("--green-light","#5aab76");
    r.style.setProperty("--red","#d62828");r.style.setProperty("--red2","#9d0208");r.style.setProperty("--red-dim","#fce4e4");
    r.style.setProperty("--ok","#e6f5ec");r.style.setProperty("--ok-text","#2a7a48");
    r.style.setProperty("--err","#fdeaea");r.style.setProperty("--err-text","#c53030");
    document.body.style.background="#ffffff";document.documentElement.style.background="#ffffff";
  }
  // Accent (paleta wybrana przez użytkownika)
  r.style.setProperty("--gold", accent.gold);
  r.style.setProperty("--gold2", accent.gold2);
  r.style.setProperty("--gold-dim", accent.goldDim);
  localStorage.setItem("lingua_theme",theme);S.theme=theme;
}

function applyPalette(paletteId){
  if(!PALETTES[paletteId]) return;
  S.palette = paletteId;
  localStorage.setItem("lingua_palette", paletteId);

}

  else if(screen==="results")root.appendChild(renderResults());
  else if(screen==="settings")root.appendChild(renderSettings());
  else if(screen==="audiomgr")root.appendChild(renderAudioMgr());
  else if(screen==="filmoteka")root.appendChild(renderFilmoteka());
  else if(screen==="mywords")root.appendChild(renderMyWords());
  else if(screen==="myphrases")root.appendChild(renderMyPhrases());
  else if(screen==="translate")root.appendChild(renderTranslate());
}

window.speechSynthesis.onvoiceschanged=()=>{};
setTimeout(render,50);
setTimeout(()=>driveSilentReconnect(0),800);
// Ostrzeżenie o localStorage quota — odpalamy po renderze, żeby banner się pokazał na żywej stronie
setTimeout(checkStorageQuota, 1500);

</script>
